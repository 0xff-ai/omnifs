# Tool pins used by CI setup scripts.

# renovate: datasource=github-releases depName=rust-cross/cargo-zigbuild
cargo_zigbuild = "0.22.3"

# renovate: datasource=github-releases depName=ziglang/zig
zig = "0.15.2"

# renovate: datasource=github-releases depName=nextest-rs/nextest
cargo_nextest = "0.9.132"

# renovate: datasource=github-releases depName=bytecodealliance/wasm-tools
wasm_tools = "1.246.2"

# renovate: datasource=github-releases depName=casey/just
just = "1.51.0"

# renovate: datasource=github-releases depName=WebAssembly/wasi-sdk
wasi_sdk = "33"
wasi_sdk_release = "33.0"

# renovate: datasource=docker depName=ghcr.io/rust-cross/cargo-zigbuild
cargo_zigbuild_container = "ghcr.io/rust-cross/cargo-zigbuild:0.22.3@sha256:b66e2a5063921aca74fc53248d75d187b7499fe1e076d78eb7d87ab1dbc52f6a"

# The pinned cargo-zigbuild container currently carries Zig 0.16.0 and
# SDKROOT=/opt/MacOSX11.3.sdk for Darwin cross-linking.
cargo_zigbuild_container_zig = "0.16.0"
