[package]
name = "structure-map"
version = "0.1.0"
edition = "2024"
publish = false

[workspace]

[dependencies]
anyhow = "1"
anstream = "0.6"
camino = { version = "1", features = ["serde1"] }
clap = { version = "4", features = ["derive"] }
ignore = "0.4"
owo-colors = "4"
proc-macro2 = { version = "1", features = ["span-locations"] }
quote = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
syn = { version = "2", features = ["full", "visit"] }
thiserror = "2"
