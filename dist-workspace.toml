[workspace]
members = ["cargo:."]

# The host CLI ships for Linux and macOS. The runtime mount remains
# Linux FUSE inside the Docker image; macOS support means the CLI talks
# to Docker Desktop and users enter the mounted environment with
# `omnifs shell`, not that omnifs exposes a native Finder mount.
[dist]
cargo-dist-version = "0.31.0"
ci = "github"
installers = []
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
]
hosting = "github"
github-attestations = true
pr-run-mode = "skip"

# Hand-maintained workflow customizations:
# - release.yml: build-wasm-providers job for wasm32-wasip2 components
# - ship-release.yml: GHCR image promotion + npm (called from release-on-merge)
# - omnifs-mount-schema: [package.metadata.dist] dist = false (dump-provider is dev-only)
# Without allow-dirty, `dist init` would overwrite release.yml on upgrade.
allow-dirty = ["ci"]
