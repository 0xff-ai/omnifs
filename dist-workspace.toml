[workspace]
members = ["cargo:."]

# The host CLI ships for Linux and macOS. The runtime mount remains
# Linux FUSE inside the Docker image; macOS support means the CLI talks
# to Docker Desktop and users enter the mounted environment with
# `omnifs shell`, not that omnifs exposes a native Finder mount.
[dist]
cargo-dist-version = "0.31.0"
ci = "github"
installers = []
# Linux CLI archives come from native CI jobs; cargo-dist owns macOS packaging only.
targets = [
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
]
hosting = "github"
github-attestations = true
pr-run-mode = "skip"

# Hand-maintained workflow customizations:
# - ci.yml: native Cargo artifact factory + Docker runtime assembly on main
# - release.yml: workflow_run after green CI — softprops GH release + promote + npm
# - omnifs-dump (dev-only tool): [package.metadata.dist] dist = false
# Without allow-dirty, `dist init` would overwrite ci.yml on upgrade.
allow-dirty = ["ci"]
