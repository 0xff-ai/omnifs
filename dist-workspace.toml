[workspace]
members = ["cargo:."]

# v0.1.0 ships Linux-only because the omnifs CLI requires FUSE, which
# isn't available on macOS or Windows. Add more targets when the
# macFUSE / WinFsp story is sorted.
[dist]
cargo-dist-version = "0.31.0"
ci = "github"
installers = []
targets = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"]
hosting = "github"
github-attestations = true
pr-run-mode = "skip"

# We append a build-wasm-providers job to release.yml that ships the
# four wasm32-wasip2 provider components alongside the host binaries.
# Without this, `dist init` would overwrite that customization on
# every dist upgrade.
allow-dirty = ["ci"]
