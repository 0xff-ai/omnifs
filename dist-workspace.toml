[workspace]
members = ["cargo:."]

# The host CLI ships for Linux and macOS. The runtime mount remains
# Linux FUSE inside the Docker image; macOS support means the CLI talks
# to Docker Desktop and users enter the mounted environment with
# `omnifs shell`, not that omnifs exposes a native Finder mount.
[dist]
cargo-dist-version = "0.31.0"
ci = "github"
installers = []
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
]
hosting = "github"
github-attestations = true
pr-run-mode = "skip"

# We append a build-wasm-providers job to release.yml that ships the
# four wasm32-wasip2 provider components alongside the host binaries.
# Without this, `dist init` would overwrite that customization on
# every dist upgrade.
allow-dirty = ["ci"]
