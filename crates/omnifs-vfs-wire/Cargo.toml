[package]
name = "omnifs-vfs-wire"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Omnifs VFS wire protocol and attach transport"
categories = ["filesystem"]
keywords = ["omnifs", "vfs", "wire", "postcard", "filesystem"]

[dependencies]
omnifs-engine = { workspace = true }
omnifs-core = { workspace = true }
# Owns the attach env var names (`OMNIFS_ATTACH_ADDR_ENV` and friends) that
# `AttachTarget` resolution and the readiness beacon parse. No cycle:
# omnifs-engine already depends on omnifs-api, so this is a diamond, not a
# new cycle, and omnifs-api depends on neither this crate nor omnifs-engine.
omnifs-api = { workspace = true }
postcard = { workspace = true }
serde = { workspace = true }
tokio = { workspace = true }
futures = "0.3"
tracing = { workspace = true }
thiserror = { workspace = true }

# The guest-side vsock dial for the libkrun frontend runner, and the
# readiness beacon's own vsock dial back to the host. Linux-only: the libkrun
# guest is Linux, and the crate's socket(AF_VSOCK, ...) call does not build on
# a non-Linux host in the first place.
[target.'cfg(target_os = "linux")'.dependencies]
tokio-vsock = "0.7.2"

[dev-dependencies]
omnifs-engine = { workspace = true, features = ["runtime"] }
tokio = { workspace = true, features = ["test-util"] }
tempfile = { workspace = true }
# Provides a real engine-backed `TreeNamespace` for the trace-propagation test.
omnifs-itest = { path = "../omnifs-itest" }
tracing-subscriber = { workspace = true }

[lints]
workspace = true
