[package]
name = "omnifs-tool-archive"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme.workspace = true
description = "WASI sandboxed archive extraction component for omnifs (tar.gz, tar, zip)"
categories = ["compression", "wasm"]
keywords = ["omnifs", "wasm", "wasip2", "archive", "tar"]

[lib]
crate-type = ["cdylib", "lib"]

[package.metadata.docs.rs]
default-target = "wasm32-wasip2"
targets = []

[dependencies]
wit-bindgen = "0.41"
flate2 = { version = "1", default-features = false, features = ["rust_backend"] }
tar = { version = "0.4", default-features = false }
zip = { version = "5", default-features = false, features = ["deflate"] }

[lints.rust]
unsafe_code = "allow"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
cast_possible_truncation = "allow"
