[package]
name = "omnifs-thin"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Credential-free out-of-process frontend runner for omnifs"
categories = ["filesystem"]
keywords = ["omnifs", "filesystem", "frontend"]

[[bin]]
name = "omnifs-thin"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true }
omnifs-engine = { workspace = true, default-features = false }
omnifs-mtab = { workspace = true }
omnifs-nfs = { workspace = true, default-features = false }
omnifs-vfs-wire = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
omnifs-fuse = { workspace = true, default-features = false }

[lints]
workspace = true
