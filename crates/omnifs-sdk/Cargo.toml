[package]
name = "omnifs-sdk"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "SDK for building omnifs providers"
categories = ["filesystem", "wasm", "development-tools"]
keywords = ["omnifs", "wasm", "wit", "sdk", "fuse"]

[dependencies]
omnifs-core = { workspace = true }
omnifs-sdk-macros = { workspace = true }
omnifs-wit = { workspace = true }
hashbrown = { workspace = true }
http = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
hex = { workspace = true }
url = { workspace = true }

# Provider metadata is constructed and serialized host-side by the build-time
# harvester; the wasm guest never touches it. The metadata types live in
# omnifs-workspace and are re-exported here for non-wasm targets only.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
omnifs-workspace = { workspace = true }
omnifs-caps = { workspace = true }

[dev-dependencies]
trybuild = { workspace = true }

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
must_use_candidate = "allow"
module_name_repetitions = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
