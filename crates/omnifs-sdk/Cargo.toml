[package]
name = "omnifs-sdk"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "SDK for building omnifs providers"
categories = ["filesystem", "wasm", "development-tools"]
keywords = ["omnifs", "wasm", "wit", "sdk", "fuse"]

[dependencies]
omnifs-mount-schema = { version = "0.1.0", path = "../omnifs-mount-schema" }
omnifs-sdk-macros = { version = "0.1.0", path = "../omnifs-sdk-macros" }
wit-bindgen = "0.41"
lru = "0.16"
hashbrown = { workspace = true }
http = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
postcard = { workspace = true }
hex = { workspace = true }
url = { workspace = true }

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
must_use_candidate = "allow"
module_name_repetitions = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
