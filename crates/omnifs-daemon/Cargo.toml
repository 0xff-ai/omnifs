[package]
name = "omnifs-daemon"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "omnifs runtime daemon: provider registry and FUSE mount loop"
categories = ["filesystem"]
keywords = ["omnifs", "fuse", "filesystem", "wasm", "daemon"]

[[bin]]
name = "omnifsd-openapi"
path = "src/bin/openapi.rs"

[dependencies]
omnifs-api = { workspace = true }
omnifs-home = { workspace = true }
omnifs-host = { workspace = true }
omnifs-inspector = { workspace = true }
omnifs-mount = { workspace = true }
omnifs-nfs = { workspace = true }
anyhow = { workspace = true }
axum = "0.8"
clap = { workspace = true }
tokio = { workspace = true }
tokio-stream = { version = "0.1", features = ["sync"] }
tracing = { workspace = true }
utoipa = { workspace = true }

# FUSE links fuser, which is Linux-only; the host-native NFS frontend builds on macOS without it.
[target.'cfg(target_os = "linux")'.dependencies]
omnifs-fuse = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }

# Not a cargo-dist target: omnifsd ships in the npm CLI platform packages
# (staged beside omnifs by release.yml), and in the runtime image.
[package.metadata.dist]
dist = false

[lints]
workspace = true
