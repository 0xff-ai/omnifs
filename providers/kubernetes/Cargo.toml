[package]
name = "omnifs-provider-kubernetes"
version.workspace = true
edition = "2024"
description = "omnifs provider for browsing a Kubernetes cluster (read-only)"
license = "MIT OR Apache-2.0"
repository = "https://github.com/0xff-ai/omnifs"
homepage = "https://github.com/0xff-ai/omnifs"

[lib]
crate-type = ["cdylib", "lib"]

[dependencies]
omnifs-sdk = { workspace = true }
hashbrown = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
k8s-openapi = { version = "0.27.1", default-features = false, features = ["v1_35"] }
# Pure-Rust YAML (via `unsafe-libyaml`, no C); builds for wasm32-wasip2.
# Used to render manifest/status leaves as YAML from the API server's JSON.
serde_yaml = "0.9"

[lints.rust]
unsafe_code = "allow"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
wildcard_imports = "allow"
too_many_lines = "allow"
trivially_copy_pass_by_ref = "allow"
match_same_arms = "allow"
needless_pass_by_value = "allow"
unnecessary_wraps = "allow"
