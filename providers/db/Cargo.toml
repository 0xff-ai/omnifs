[package]
name = "omnifs-provider-db"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "omnifs provider for browsing relational databases (SQLite today, PostgreSQL future)"
categories = ["filesystem", "wasm", "database"]
keywords = ["omnifs", "database", "sqlite", "filesystem", "wasm"]

[lib]
crate-type = ["cdylib", "lib"]

[package.metadata.docs.rs]
default-target = "wasm32-wasip2"
targets = []

[dependencies]
omnifs-sdk = { workspace = true }
hashbrown = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
hex = { workspace = true }
sha2 = { workspace = true }
# rusqlite with `bundled` compiles the C SQLite source against
# `wasi-libc`. The provider build needs a wasi-sysroot exposed via
# WASI_SYSROOT (or CFLAGS_wasm32_wasip2=--sysroot=...) so that
# libsqlite3-sys can find `stdio.h` and friends. The Docker build
# fetches wasi-sdk and sets WASI_SYSROOT for the providers stage.
rusqlite = { version = "0.36", default-features = false, features = ["bundled"] }
thiserror = { workspace = true }
[lints.rust]
unsafe_code = "allow"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
wildcard_imports = "allow"
too_many_lines = "allow"
trivially_copy_pass_by_ref = "allow"
match_same_arms = "allow"
needless_pass_by_value = "allow"
unnecessary_wraps = "allow"
