[package]
name = "omnifs-provider-dns"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "omnifs provider for DNS record browsing via DNS-over-HTTPS"
categories = ["filesystem", "wasm", "network-programming"]
keywords = ["omnifs", "dns", "doh", "filesystem", "wasm"]
autotests = false

[lib]
crate-type = ["cdylib", "lib"]

[[test]]
name = "main"
path = "tests/main.rs"

[package.metadata.docs.rs]
default-target = "wasm32-wasip2"
targets = []

[dependencies]
base64 = "0.22"
omnifs-sdk = { workspace = true }
serde = { workspace = true }
hickory-proto = "0.26"

[dev-dependencies]
base64 = "0.22"
hickory-proto = "0.26"
omnifs-core = { workspace = true }
omnifs-engine = { workspace = true }
omnifs-itest = { path = "../../crates/omnifs-itest" }
omnifs-wit = { workspace = true, features = ["host-bindings"] }
tokio = { workspace = true }

[lints.rust]
unsafe_code = "allow"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
wildcard_imports = "allow"
too_many_lines = "allow"
trivially_copy_pass_by_ref = "allow"
match_same_arms = "allow"
needless_pass_by_value = "allow"
unnecessary_wraps = "allow"
