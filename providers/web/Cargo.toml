[package]
name = "omnifs-provider-web"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "omnifs provider for projecting allowed web pages as Markdown and raw files"
categories = ["filesystem", "wasm", "web-programming"]
keywords = ["omnifs", "web", "readability", "filesystem", "wasm"]

[lib]
crate-type = ["cdylib", "lib"]

[package.metadata.docs.rs]
default-target = "wasm32-wasip2"
targets = []

[dependencies]
dom_smoothie = "0.18.0"
omnifs-sdk = { workspace = true }
serde = { workspace = true }

[lints.rust]
unsafe_code = "allow"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
needless_pass_by_value = "allow"
