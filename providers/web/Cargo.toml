[package]
name = "omnifs-provider-web"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "omnifs provider that fetches any URL and projects it as Markdown"
categories = ["filesystem", "wasm", "web-programming"]
keywords = ["omnifs", "web", "markdown", "html", "wasm"]

[lib]
crate-type = ["cdylib", "lib"]

[package.metadata.docs.rs]
default-target = "wasm32-wasip2"
targets = []

[dependencies]
omnifs-sdk = { workspace = true }
htmd = { workspace = true }
serde = { workspace = true }

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
wildcard_imports = "allow"
unused_async = "allow"
too_many_arguments = "allow"
unnecessary_wraps = "allow"
