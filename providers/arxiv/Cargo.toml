[package]
name = "omnifs-provider-arxiv"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "omnifs provider for browsing arXiv papers"
categories = ["filesystem", "wasm", "science"]
keywords = ["omnifs", "arxiv", "papers", "research", "wasm"]

[lib]
crate-type = ["cdylib", "lib"]

[package.metadata.docs.rs]
default-target = "wasm32-wasip2"
targets = []

[dependencies]
hashbrown = { workspace = true }
omnifs-sdk = { workspace = true }
percent-encoding = { workspace = true }
quick-xml = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
url = { workspace = true }
[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
wildcard_imports = "allow"
too_many_lines = "allow"
trivially_copy_pass_by_ref = "allow"
match_same_arms = "allow"
needless_pass_by_value = "allow"
