[package]
name = "omnifs-provider-github"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "omnifs provider for browsing GitHub repositories, issues, and pull requests"
categories = ["filesystem", "wasm"]
keywords = ["omnifs", "github", "filesystem", "wasm", "git"]

[lib]
crate-type = ["cdylib", "lib"]

[package.metadata.docs.rs]
default-target = "wasm32-wasip2"
targets = []

[dependencies]
omnifs-core = { workspace = true }
omnifs-sdk = { workspace = true }
http = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
rc-zip-sync = { version = "4", default-features = false, features = ["deflate"] }

[lints.rust]
unsafe_code = "allow"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
wildcard_imports = "allow"
too_many_lines = "allow"
trivially_copy_pass_by_ref = "allow"
match_same_arms = "allow"
needless_pass_by_value = "allow"
unnecessary_wraps = "allow"
