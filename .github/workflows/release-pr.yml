name: Release PR

# Owns the release coordinator: on every push to main it keeps a standing
# release PR up to date (version bump + regenerated changelog + npm sync), and
# when that PR merges it creates the git tag. The Release workflow (release.yml)
# ships off that tag after CI. No external release tool; git-cliff is the engine.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-pr
  cancel-in-progress: false

jobs:
  release-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history + tags for git-cliff and the version compare

      - uses: dtolnay/rust-toolchain@1.95.0

      - uses: taiki-e/install-action@v2
        with:
          tool: git-cliff@2.13.1,cargo-edit

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Maintain release PR, or tag a merged release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Already tagged this commit? Nothing to do.
          if [ -n "$(git tag --points-at HEAD --list 'v[0-9]*')" ]; then
            echo "commit already tagged; nothing to do"
            exit 0
          fi

          last_tag="$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || true)"
          range=()
          [ -n "$last_tag" ] && range=("${last_tag}..HEAD")

          next="$(git-cliff --config cliff.toml "${range[@]}" --bumped-version)" # e.g. v0.3.0
          cur="$(cargo metadata --no-deps --format-version 1 \
                 | jq -r '.packages[] | select(.name=="omnifs-cli") | .version')"

          # Release PR already merged (version bumped past the last tag) but not
          # yet tagged -> tag it so release.yml ships after CI.
          if [ "$cur" = "${next#v}" ] && [ "v$cur" != "$last_tag" ]; then
            echo "tagging merged release v$cur"
            git tag "v$cur"
            git push origin "v$cur"
            exit 0
          fi

          # Nothing releasable since the last tag -> leave any open PR as-is.
          if [ "${next#v}" = "${last_tag#v}" ]; then
            echo "no releasable commits since ${last_tag:-the beginning}"
            exit 0
          fi

          # Accumulating: rebuild the standing release PR for $next.
          git checkout -B release-pr
          cargo set-version "${next#v}"
          cargo update --workspace
          cargo xtask npm sync

          # Regenerate the pending changelog section, preserving curated released
          # history (everything from the first `## [X.Y.Z]` heading downward).
          git-cliff --config cliff.toml "${range[@]}" --tag "$next" > pending.md
          awk '/^## \[[0-9]/{keep=1} keep' CHANGELOG.md > released.md
          cat pending.md released.md > CHANGELOG.md
          rm -f pending.md released.md

          git commit -aqm "chore(release): prepare $next"
          git push --force origin release-pr

          if [ -z "$(gh pr list --head release-pr --base main --state open --json number --jq '.[0].number')" ]; then
            gh pr create --base main --head release-pr \
              --title "chore(release): $next" \
              --label release \
              --body "Automated release PR. Merging bumps the workspace to **$next**, syncs npm package versions, and finalizes the changelog below; the Release workflow then tags \`$next\` and ships after CI. Edit the changelog here before merging to polish it."
          fi
