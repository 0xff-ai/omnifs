name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish npm packages
        type: boolean
        default: true
      ci_run_id:
        description: CI run ID to consume when dispatching manually
        type: string
        required: false

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE_NAME: ${{ github.repository }}-frontend
  GUEST_IMAGE_NAME: ${{ github.repository }}-guest

jobs:
  plan:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.event == 'push'
      )
    runs-on: ubuntu-latest
    outputs:
      should_ship: ${{ steps.plan.outputs.should_ship }}
      tag: ${{ steps.plan.outputs.tag }}
      version: ${{ steps.plan.outputs.version }}
      is_prerelease: ${{ steps.plan.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Decide whether to ship
        id: plan
        run: |
          set -euo pipefail
          sha="${{ github.event.workflow_run.head_sha || github.sha }}"
          # release-pr.yml tags the merge commit when a release PR lands; a v* tag
          # on this commit is the signal to ship.
          tag="$(git tag --points-at "$sha" --list 'v[0-9]*' | sort -V | tail -1)"
          if [ -z "$tag" ]; then
            echo "no release tag on $sha; nothing to ship"
            echo "should_ship=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          version="${tag#v}"
          # Semver prerelease: any version with a hyphen (e.g. 0.3.0-rc.1).
          case "$version" in *-*) is_prerelease=true ;; *) is_prerelease=false ;; esac
          # Release notes = the changelog section for this version.
          awk -v h="## [$version]" 'index($0,h)==1{g=1;next} g&&/^## \[/{exit} g' CHANGELOG.md > release-notes.md
          {
            echo "should_ship=true"
            echo "tag=$tag"
            echo "version=$version"
            echo "is_prerelease=$is_prerelease"
          } >> "$GITHUB_OUTPUT"

      - name: Upload release notes
        if: steps.plan.outputs.should_ship == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release-notes.md
          retention-days: 1

  darwin_arm64_sign:
    name: sign and submit darwin arm64
    if: needs.plan.outputs.should_ship == 'true'
    needs: plan
    runs-on: macos-15
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Resolve CI workflow run
        id: ci_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_CI_RUN_ID: ${{ inputs.ci_run_id || '' }}
        run: |
          set -euo pipefail
          if [[ -n "$INPUT_CI_RUN_ID" ]]; then
            echo "run_id=$INPUT_CI_RUN_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          run_id="$(gh run list --workflow ci.yml --branch main --limit 30 --json databaseId,conclusion \
            | jq -r '[.[] | select(.conclusion == "success")] | first | .databaseId')"
          if [[ -z "$run_id" || "$run_id" == "null" ]]; then
            echo "no successful ci.yml run found on main" >&2
            exit 1
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download Darwin arm64 CI payload
        uses: actions/download-artifact@v8
        with:
          name: omnifs-cli-darwin-arm64
          run-id: ${{ steps.ci_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ci-payload

      - name: Sign payload and submit once for notarization
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          : "${APPLE_CERTIFICATE_BASE64:?APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 is required}"
          : "${APPLE_CERTIFICATE_PASSWORD:?APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD is required}"
          : "${APPLE_SIGNING_IDENTITY:?APPLE_DEVELOPER_ID_APPLICATION is required}"
          : "${APPLE_NOTARY_APPLE_ID:?APPLE_NOTARY_APPLE_ID is required}"
          : "${APPLE_NOTARY_PASSWORD:?APPLE_NOTARY_PASSWORD is required}"
          : "${APPLE_TEAM_ID:?APPLE_TEAM_ID is required}"

          archive="ci-payload/omnifs-cli-darwin-arm64.tar.xz"
          checksum="ci-payload/omnifs-cli-darwin-arm64.tar.xz.sha256"
          expected="$(awk '{print $1}' "$checksum")"
          actual="$(shasum -a 256 "$archive" | awk '{print $1}')"
          [[ "$actual" == "$expected" ]] || {
            echo "Darwin arm64 CI archive checksum mismatch" >&2
            exit 1
          }

          payload="$RUNNER_TEMP/omnifs-darwin-arm64"
          mkdir -p "$payload"
          tar -xJf "$archive" -C "$payload"
          scripts/ci/check-darwin-arm64-payload.sh "$payload"

          keychain="$RUNNER_TEMP/omnifs-signing.keychain-db"
          certificate="$RUNNER_TEMP/developer-id.p12"
          keychain_password="$(uuidgen)"
          cleanup() {
            security delete-keychain "$keychain" 2>/dev/null || true
            rm -f "$certificate"
          }
          trap cleanup EXIT

          printf '%s' "$APPLE_CERTIFICATE_BASE64" | /usr/bin/base64 -D >"$certificate"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate" \
            -k "$keychain" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain"
          security list-keychains -d user -s "$keychain"
          security find-identity -v -p codesigning "$keychain" \
            | grep -F "$APPLE_SIGNING_IDENTITY"

          scripts/ci/sign-darwin-arm64-payload.sh \
            "$payload" \
            "$APPLE_SIGNING_IDENTITY" \
            "$APPLE_TEAM_ID"

          signed_tar="$RUNNER_TEMP/signed-payload.tar"
          tar -C "$payload" -cf "$signed_tar" .
          notary_zip="$RUNNER_TEMP/omnifs-darwin-arm64-notary.zip"
          ditto -c -k --keepParent "$payload" "$notary_zip"
          xcrun notarytool submit "$notary_zip" \
            --apple-id "$APPLE_NOTARY_APPLE_ID" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json >"$RUNNER_TEMP/notary-submission.json"
          jq -er '.id' "$RUNNER_TEMP/notary-submission.json" \
            >"$RUNNER_TEMP/notary-submission-id"

      - name: Upload signed payload and submission identity
        uses: actions/upload-artifact@v7
        with:
          name: omnifs-cli-darwin-arm64-signed
          path: |
            ${{ runner.temp }}/signed-payload.tar
            ${{ runner.temp }}/notary-submission.json
            ${{ runner.temp }}/notary-submission-id
          retention-days: 7
          if-no-files-found: error

  darwin_arm64_notarize:
    name: wait for darwin arm64 notarization
    if: needs.plan.outputs.should_ship == 'true'
    needs: [plan, darwin_arm64_sign]
    runs-on: macos-15
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Download signed payload
        uses: actions/download-artifact@v8
        with:
          name: omnifs-cli-darwin-arm64-signed
          path: signed

      - name: Wait for the existing submission to reach Accepted
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          submission_id="$(cat signed/notary-submission-id)"
          scripts/ci/wait-for-notarization.sh "$submission_id" \
            >signed/notary-result.json
          [[ "$(jq -r '.status' signed/notary-result.json)" == "Accepted" ]]

      - name: Package the accepted signed payload
        run: |
          set -euo pipefail
          payload="$RUNNER_TEMP/omnifs-darwin-arm64"
          mkdir -p "$payload"
          tar -xf signed/signed-payload.tar -C "$payload"
          scripts/ci/check-darwin-arm64-payload.sh "$payload"
          scripts/ci/package-cli.sh darwin-arm64 --payload-dir "$payload"

      - name: Attest accepted Darwin arm64 CLI archive
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: dist/cli/darwin-arm64/omnifs-cli-darwin-arm64.tar.xz

      - name: Upload accepted Darwin arm64 CLI archive
        uses: actions/upload-artifact@v7
        with:
          name: omnifs-cli-darwin-arm64-notarized
          path: dist/cli/darwin-arm64/omnifs-cli-darwin-arm64.tar.xz*
          retention-days: 90
          if-no-files-found: error

  github-release:
    if: needs.plan.outputs.should_ship == 'true'
    needs: [plan, darwin_arm64_notarize]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Download release notes
        uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: .

      - name: Resolve CI workflow run
        id: ci_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_CI_RUN_ID: ${{ inputs.ci_run_id || '' }}
        run: |
          set -euo pipefail
          if [[ -n "$INPUT_CI_RUN_ID" ]]; then
            echo "run_id=$INPUT_CI_RUN_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          run_id="$(gh run list --workflow ci.yml --branch main --limit 30 --json databaseId,conclusion \
            | jq -r '[.[] | select(.conclusion == "success")] | first | .databaseId')"
          if [[ -z "$run_id" || "$run_id" == "null" ]]; then
            echo "no successful ci.yml run found on main" >&2
            exit 1
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download CI release artifacts
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ steps.ci_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: release-assets

      - name: Remove unsigned Darwin arm64 CI archive
        run: rm -rf release-assets/omnifs-cli-darwin-arm64

      - name: Download accepted Darwin arm64 archive
        uses: actions/download-artifact@v8
        with:
          name: omnifs-cli-darwin-arm64-notarized
          path: release-assets/omnifs-cli-darwin-arm64

      - name: Verify release assets
        run: |
          set -euo pipefail
          shopt -s nullglob
          cli=(release-assets/omnifs-cli-*/*.tar.xz)
          if (( ${#cli[@]} < 4 )); then
            printf 'expected 4 omnifs-cli archives, found %d\n' "${#cli[@]}" >&2
            find release-assets -type f >&2 || true
            exit 1
          fi

      - name: Publish GitHub release and assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.plan.outputs.tag }}
          name: omnifs v${{ needs.plan.outputs.version }}
          body_path: release-notes.md
          target_commitish: ${{ github.event.workflow_run.head_sha || github.sha }}
          files: |
            release-assets/omnifs-cli-*/*.tar.xz
            release-assets/omnifs-cli-*/*.tar.xz.sha256
          fail_on_unmatched_files: true
          prerelease: ${{ needs.plan.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.plan.outputs.is_prerelease == 'true' && 'false' || 'true' }}

  promote:
    if: needs.plan.outputs.should_ship == 'true'
    needs: plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - uses: ./.github/actions/omnifs-docker

      - uses: oras-project/setup-oras@v2
        with:
          version: 1.3.1

      - name: Promote CI frontend image to release tags
        id: promote_frontend
        env:
          TAG: ${{ needs.plan.outputs.tag }}
          VERSION: ${{ needs.plan.outputs.version }}
          RELEASE_COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail
          digest="$(scripts/ci/promote-image.sh \
            "${{ env.REGISTRY }}" \
            "${{ env.FRONTEND_IMAGE_NAME }}" \
            "$RELEASE_COMMIT_SHA" \
            "$TAG" \
            "$VERSION")"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Attest frontend image build provenance
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          subject-digest: ${{ steps.promote_frontend.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      # The libkrun guest disk image: a non-container OCI artifact (see
      # guest-image-arm64 in ci.yml), so promotion retags via `oras tag`
      # rather than `docker buildx imagetools create`.
      - name: Promote CI guest image to release tags
        id: promote_guest_image
        env:
          TAG: ${{ needs.plan.outputs.tag }}
          VERSION: ${{ needs.plan.outputs.version }}
          RELEASE_COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail
          digest="$(scripts/ci/promote-guest-image.sh \
            "${{ env.REGISTRY }}" \
            "${{ env.GUEST_IMAGE_NAME }}" \
            "$RELEASE_COMMIT_SHA" \
            "$TAG" \
            "$VERSION")"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Attest guest image build provenance
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.GUEST_IMAGE_NAME }}
          subject-digest: ${{ steps.promote_guest_image.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

  npm-platforms:
    if: needs.plan.outputs.should_ship == 'true'
    needs: [plan, github-release, promote]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - uses: ./.github/actions/omnifs-just

      - uses: dtolnay/rust-toolchain@1.95.0

      - name: Resolve CI workflow run
        id: ci_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_CI_RUN_ID: ${{ inputs.ci_run_id || '' }}
        run: |
          set -euo pipefail
          if [[ -n "$INPUT_CI_RUN_ID" ]]; then
            echo "run_id=$INPUT_CI_RUN_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          run_id="$(gh run list --workflow ci.yml --branch main --limit 30 --json databaseId,conclusion \
            | jq -r '[.[] | select(.conclusion == "success")] | first | .databaseId')"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download platform CLI archives from CI
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ steps.ci_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: omnifs-cli-*
          path: dist-download
          merge-multiple: false

      - name: Replace Darwin arm64 with the accepted signed archive
        run: rm -rf dist-download/omnifs-cli-darwin-arm64

      - uses: actions/download-artifact@v8
        with:
          name: omnifs-cli-darwin-arm64-notarized
          path: dist-download/omnifs-cli-darwin-arm64

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Stage npm platform packages
        env:
          VERSION: ${{ needs.plan.outputs.version }}
          SHOULD_PUBLISH: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
          NPM_TAG: ${{ needs.plan.outputs.is_prerelease == 'true' && 'dev' || 'latest' }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          just npm sync

          for pkg in npm/platform/*; do
            [[ -d "$pkg" ]] || continue
            platform="$(basename "$pkg")"
            archive="$(find dist-download -type f -name "omnifs-cli-${platform}.tar.xz" | head -n 1)"
            if [[ -z "$archive" ]]; then
              echo "missing CLI archive for $platform" >&2
              find dist-download -type f >&2 || true
              exit 1
            fi

            extract_dir="$RUNNER_TEMP/extract-$platform"
            rm -rf "$extract_dir"
            mkdir -p "$extract_dir"
            tar -xJf "$archive" -C "$extract_dir"
            binary="$extract_dir/omnifs"
            if [[ ! -x "$binary" ]]; then
              echo "missing omnifs binary in $archive" >&2
              find "$extract_dir" -type f >&2 || true
              exit 1
            fi

            thin_binary="$extract_dir/omnifs-thin"
            if [[ ! -x "$thin_binary" ]]; then
              echo "missing omnifs-thin binary in $archive" >&2
              exit 1
            fi

            if [[ "$platform" == "linux-x64" ]]; then
              actual="$("$binary" --version)"
              expected="omnifs ${VERSION}"
              if [[ "$actual" != "$expected" ]]; then
                printf 'CLI version mismatch: expected %s, got %s\n' "$expected" "$actual" >&2
                exit 1
              fi
              actual="$("$thin_binary" --version)"
              expected="omnifs-thin ${VERSION}"
              if [[ "$actual" != "$expected" ]]; then
                printf 'thin runner version mismatch: expected %s, got %s\n' "$expected" "$actual" >&2
                exit 1
              fi
              actual="$("$thin_binary" fuse --version)"
              expected="omnifs-thin ${VERSION}"
              if [[ "$actual" != "$expected" ]]; then
                printf 'thin FUSE mode version mismatch: expected %s, got %s\n' "$expected" "$actual" >&2
                exit 1
              fi
            fi

            mkdir -p "$pkg/bin"
            cp "$binary" "$pkg/bin/omnifs"
            cp "$thin_binary" "$pkg/bin/omnifs-thin"
            chmod 755 "$pkg/bin/omnifs"
            chmod 755 "$pkg/bin/omnifs-thin"
            if [[ "$platform" == "darwin-arm64" ]]; then
              helper="$extract_dir/omnifs-libkrun"
              runtime="$extract_dir/libexec/omnifs"
              if [[ ! -x "$helper" || ! -d "$runtime" ]]; then
                echo "missing signed libkrun payload in $archive" >&2
                find "$extract_dir" -type f >&2 || true
                exit 1
              fi
              cp "$helper" "$pkg/bin/omnifs-libkrun"
              rm -rf "$pkg/bin/libexec"
              mkdir -p "$pkg/bin/libexec"
              cp -R "$runtime" "$pkg/bin/libexec/omnifs"
              chmod 755 "$pkg/bin/omnifs-libkrun"
            fi
            npm pack "$pkg" --pack-destination "$RUNNER_TEMP"

            if [[ "$SHOULD_PUBLISH" == "true" ]]; then
              npm publish "$pkg" --access public --provenance --tag "$NPM_TAG"
            fi
          done

  npm-root:
    if: needs.plan.outputs.should_ship == 'true'
    needs: [plan, github-release, promote, npm-platforms]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - uses: ./.github/actions/omnifs-just

      - uses: dtolnay/rust-toolchain@1.95.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Sync npm metadata
        run: just npm sync

      - name: Stage root package
        run: just npm pack "$RUNNER_TEMP"

      - name: Publish root package
        if: >-
          github.event_name != 'workflow_dispatch' ||
          inputs.publish
        env:
          NPM_TAG: ${{ needs.plan.outputs.is_prerelease == 'true' && 'dev' || 'latest' }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish ./npm/omnifs --access public --provenance --tag "$NPM_TAG"
