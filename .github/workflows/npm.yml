name: NPM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to package, without the leading v'
        required: true
      publish:
        description: 'Publish to npm instead of only packing'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  platform:
    name: npm-platform (${{ matrix.package-platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - package-platform: linux-x64
            rust-target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - package-platform: linux-arm64
            rust-target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - package-platform: darwin-x64
            rust-target: x86_64-apple-darwin
            runner: macos-15-intel
          - package-platform: darwin-arm64
            rust-target: aarch64-apple-darwin
            runner: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.0
          targets: ${{ matrix.rust-target }}

      - name: Build host CLI
        run: cargo build --profile dist -p omnifs-cli --target "${{ matrix.rust-target }}"

      - name: Stage npm package
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          node npm/scripts/sync-version.mjs "$version"
          node npm/scripts/stage-platform-package.mjs \
            "${{ matrix.package-platform }}" \
            "target/${{ matrix.rust-target }}/dist/omnifs"
          npm pack "./npm/platform/${{ matrix.package-platform }}" --pack-destination "$RUNNER_TEMP"

      - name: Publish platform package
        if: ${{ github.event_name == 'push' || inputs.publish }}
        run: npm publish "./npm/platform/${{ matrix.package-platform }}" --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  root:
    name: npm-root
    runs-on: ubuntu-latest
    needs: platform
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Stage root package
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          node npm/scripts/sync-version.mjs "$version"
          npm pack ./npm/omnifs --pack-destination "$RUNNER_TEMP"

      - name: Publish root package
        if: ${{ github.event_name == 'push' || inputs.publish }}
        run: npm publish ./npm/omnifs --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
