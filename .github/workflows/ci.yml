name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Registry-backed buildx cache refs. Jobs read the deps cache plus
  # their own target cache, then write only their own ref. That keeps
  # cache reuse broad without making parallel jobs overwrite one
  # shared manifest.
  BUILD_CACHE_BASE: ghcr.io/${{ github.repository }}:buildcache

jobs:
  deps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Warm cargo-chef deps cache
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          target: deps
          push: false
          load: false
          cache-from: type=registry,ref=${{ env.BUILD_CACHE_BASE }}-deps
          cache-to: type=registry,ref=${{ env.BUILD_CACHE_BASE }}-deps,mode=max

  lint:
    runs-on: ubuntu-latest
    needs: deps
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run cargo fmt + clippy inside the builder image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          target: lint
          push: false
          load: false
          cache-from: |
            type=registry,ref=${{ env.BUILD_CACHE_BASE }}-deps
            type=registry,ref=${{ env.BUILD_CACHE_BASE }}-lint
          cache-to: type=registry,ref=${{ env.BUILD_CACHE_BASE }}-lint,mode=max

  build-test:
    runs-on: ubuntu-latest
    needs: deps
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run cargo test inside the builder image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          target: test
          push: false
          load: false
          cache-from: |
            type=registry,ref=${{ env.BUILD_CACHE_BASE }}-deps
            type=registry,ref=${{ env.BUILD_CACHE_BASE }}-test
          cache-to: type=registry,ref=${{ env.BUILD_CACHE_BASE }}-test,mode=max

  runtime-amd64:
    name: docker-build (linux/amd64)
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && (
        contains(fromJSON('["raulk"]'), github.event.pull_request.user.login) ||
        contains(github.event.pull_request.labels.*.name, 'ci-full')
      ))
    runs-on: ubuntu-latest
    needs: deps
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker labels
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push amd64 image by digest
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          target: runtime
          platforms: linux/amd64
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: |
            type=registry,ref=${{ env.BUILD_CACHE_BASE }}-deps
            type=registry,ref=${{ env.BUILD_CACHE_BASE }}-runtime-amd64
          cache-to: type=registry,ref=${{ env.BUILD_CACHE_BASE }}-runtime-amd64,mode=max
          provenance: mode=max
          sbom: true

      - name: Export image digest
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload image digest
        uses: actions/upload-artifact@v7.0.1
        with:
          name: docker-digest-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  smoke:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && (
        contains(fromJSON('["raulk"]'), github.event.pull_request.user.login) ||
        contains(github.event.pull_request.labels.*.name, 'ci-full')
      ))
    runs-on: ubuntu-latest
    needs: runtime-amd64
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      CONTAINER: omnifs
      IMAGE: ghcr.io/${{ github.repository }}:smoke
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Download amd64 image digest
        uses: actions/download-artifact@v8.0.1
        with:
          name: docker-digest-amd64
          path: /tmp/digests

      - name: Pull the amd64 image and tag it for smoke
        # docker-build pushes runtime images by digest only (no tags);
        # pull the digest the matrix produced and retag it for this job.
        # Skips the image build entirely.
        run: |
          set -euo pipefail
          digest_path=$(find /tmp/digests -mindepth 1 -maxdepth 1 -type f | head -n 1)
          if [ -z "$digest_path" ]; then
            echo "no digest artifact found" >&2
            exit 1
          fi
          digest_file="${digest_path##*/}"
          ref="${REGISTRY}/${IMAGE_NAME}@sha256:${digest_file}"
          docker pull "$ref"
          docker tag "$ref" "$IMAGE"

      - name: Start SSH agent socket
        run: |
          set -euo pipefail
          eval "$(ssh-agent -a "$RUNNER_TEMP/ssh-agent.sock")"
          echo "SSH_AUTH_SOCK=$RUNNER_TEMP/ssh-agent.sock" >> "$GITHUB_ENV"

      - name: Create fixtures
        run: |
          set -euo pipefail
          mkdir -p .secrets/db
          # GitHub token for the github provider.
          printf '%s' "${{ github.token }}" > .secrets/github_token
          chmod 600 .secrets/github_token
          # Chinook SQLite fixture for the db provider. The image bakes
          # providers/db/omnifs.provider.json with path /data/test.db;
          # the smoke container mounts .secrets/db there. Pinned to the
          # lerocha master copy; the database has not changed in years.
          curl -fsSL -o .secrets/db/test.db \
            https://raw.githubusercontent.com/lerocha/chinook-database/master/ChinookDatabase/DataSources/Chinook_Sqlite.sqlite

      - name: Start container
        # Mirrors the container shape that `omnifs dev` launches via the
        # Docker API: FUSE device, SYS_ADMIN, apparmor:unconfined,
        # github token secret, chinook DB fixture, host docker socket,
        # and the SSH agent forward for git providers.
        run: |
          set -euo pipefail
          docker rm -f "$CONTAINER" >/dev/null 2>&1 || true
          docker run -d \
            --name "$CONTAINER" \
            --device /dev/fuse \
            --cap-add SYS_ADMIN \
            --security-opt apparmor:unconfined \
            -e SSH_AUTH_SOCK=/ssh-agent \
            -e GIT_SSH_COMMAND='ssh -F /dev/null -o StrictHostKeyChecking=accept-new' \
            -v "${{ github.workspace }}/.secrets/github_token:/run/secrets/github_token:ro" \
            -v "${{ github.workspace }}/.secrets/db:/data:ro" \
            -v "${{ github.workspace }}/scripts/demo.sh:/tmp/demo.sh:ro" \
            -v "/var/run/docker.sock:/var/run/docker.sock:ro" \
            -v "$SSH_AUTH_SOCK:/ssh-agent" \
            "$IMAGE"

          for _ in $(seq 1 60); do
            if docker exec "$CONTAINER" sh -lc "grep -qs ' /omnifs ' /proc/mounts"; then
              exit 0
            fi
            if ! docker ps --format '{{.Names}}' | grep -qx "$CONTAINER"; then
              docker logs "$CONTAINER" >&2 || true
              docker exec "$CONTAINER" sh -lc 'cat /tmp/omnifs.log' >&2 || true
              exit 1
            fi
            sleep 1
          done

          docker logs "$CONTAINER" >&2 || true
          docker exec "$CONTAINER" sh -lc 'cat /tmp/omnifs.log' >&2 || true
          exit 1

      - name: Run demo smoke script
        run: |
          set -euo pipefail
          docker exec "$CONTAINER" env \
            OMNIFS_DEMO_MODE=smoke \
            OMNIFS_DEMO_OWNER=ollama \
            OMNIFS_DEMO_REPO=ollama \
            /tmp/demo.sh

      - name: Dump omnifs log on failure
        if: failure()
        run: |
          docker logs "$CONTAINER" || true
          docker exec "$CONTAINER" sh -lc 'cat /tmp/omnifs.log' || true

      - name: Clean up
        if: always()
        run: docker rm -f "$CONTAINER" || true

  runtime-arm64:
    name: docker-build (linux/arm64)
    runs-on: ubuntu-24.04-arm
    needs: [lint, build-test]
    if: >-
      (github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/v')
      )) ||
      (github.event_name == 'pull_request' && (
        contains(fromJSON('["raulk"]'), github.event.pull_request.user.login) ||
        contains(github.event.pull_request.labels.*.name, 'ci-full')
      ))
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker labels
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push arm64 image by digest
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          target: runtime
          platforms: linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: |
            type=registry,ref=${{ env.BUILD_CACHE_BASE }}-deps
            type=registry,ref=${{ env.BUILD_CACHE_BASE }}-runtime-arm64
          cache-to: type=registry,ref=${{ env.BUILD_CACHE_BASE }}-runtime-arm64,mode=max
          # In-manifest SLSA provenance + SPDX SBOM, attached to the
          # image manifest by buildkit and verifiable with cosign.
          provenance: mode=max
          sbom: true

      - name: Export image digest
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload image digest
        uses: actions/upload-artifact@v7.0.1
        with:
          name: docker-digest-arm64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-publish:
    runs-on: ubuntu-latest
    needs: [lint, build-test, runtime-amd64, runtime-arm64, smoke]
    if: >-
      (github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/v')
      )) ||
      (github.event_name == 'pull_request' && (
        contains(fromJSON('["raulk"]'), github.event.pull_request.user.login) ||
        contains(github.event.pull_request.labels.*.name, 'ci-full')
      ))
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Download image digests
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: docker-digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create and push manifest list
        working-directory: /tmp/digests
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=("-t" "$tag")
          done

          shopt -s nullglob
          digest_files=(*)
          if (( ${#digest_files[@]} != 2 )); then
            printf 'expected 2 platform digests, found %d\n' "${#digest_files[@]}" >&2
            exit 1
          fi

          refs=()
          for digest_file in "${digest_files[@]}"; do
            refs+=("$IMAGE@sha256:$digest_file")
          done

          docker buildx imagetools create "${tag_args[@]}" "${refs[@]}"

      - name: Verify pushed image platforms
        id: manifest
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
        run: |
          set -euo pipefail
          tag="$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")"
          docker buildx imagetools inspect "$tag" | tee image-manifest.txt
          grep -q 'Platform:.*linux/amd64' image-manifest.txt
          grep -q 'Platform:.*linux/arm64' image-manifest.txt
          digest="$(awk '/^Digest:/ { print $2; exit }' image-manifest.txt)"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Attest image build provenance
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true
          # `raulk/omnifs` is a user-owned repo. GitHub's attestation
          # storage records are only supported for org-owned repos, so
          # the default create-storage-record=true would fail at attest
          # time. The Sigstore bundle is still attached to the OCI
          # manifest (via push-to-registry) and is verifiable with
          # `gh attestation verify`.
          create-storage-record: false
