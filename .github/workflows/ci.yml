name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE_NAME: ${{ github.repository }}-frontend
  GUEST_IMAGE_NAME: ${{ github.repository }}-guest
  CI_MAIN_PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

jobs:
  # Set the repository Actions variable CI_RUNNER_FAMILY=blacksmith to use
  # Blacksmith runners. Leave it unset, or set it to github, to use standard
  # GitHub-hosted runners.
  # Decide whether this run executes the build matrix. Every build job
  # transitively `needs: preflight`, so gating preflight here cascades a skip to
  # the whole matrix (a skipped dependency skips its dependents). A run skips the
  # matrix only when the *latest push* to a PR touched nothing but CHANGELOG.md,
  # keeping changelog-only edits off the build. Status checks are advisory (the
  # `main` ruleset requires none), so a skip never blocks a merge.
  changes:
    name: changes
    runs-on: &linux_runner ${{ vars.CI_RUNNER_FAMILY == 'blacksmith' && 'blacksmith-2vcpu-ubuntu-2404' || 'ubuntu-latest' }}
    outputs:
      code: ${{ steps.decide.outputs.code }}
      guest_image: ${{ steps.decide.outputs.guest_image }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Detect changes in the *latest push* to a PR (before..after), not the
      # whole PR diff, so a changelog-only commit is judged on its own delta.
      # The step is skipped on a fresh PR or a branch push (no
      # prior head SHA); `decide` then defaults to running the matrix.
      - id: filter
        if: >-
          github.event_name == 'pull_request' &&
          github.event.before != '' &&
          github.event.before != '0000000000000000000000000000000000000000'
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before }}
          ref: ${{ github.event.after }}
          filters: |
            code:
              - '**'
              - '!CHANGELOG.md'
            guest_image:
              - 'scripts/guest-image/**'
              - 'crates/omnifs-fuse/**'
              - 'crates/omnifs-vfs-wire/**'
              - '.github/workflows/ci.yml'
      - id: decide
        env:
          FILTER_OUTCOME: ${{ steps.filter.outcome }}
          CODE_CHANGED: ${{ steps.filter.outputs.code }}
          GUEST_IMAGE_CHANGED: ${{ steps.filter.outputs.guest_image }}
        run: |
          set -euo pipefail
          # Skip the matrix only when the filter ran and saw nothing but
          # CHANGELOG.md in the latest push; otherwise run the full matrix.
          if [ "$FILTER_OUTCOME" = "success" ] && [ "$CODE_CHANGED" = "false" ]; then
            code=false
          else
            code=true
          fi
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "filter_outcome=$FILTER_OUTCOME code_changed=${CODE_CHANGED:-<none>} -> code=$code"

          # guest-image-arm64 is heavier than the rest of the matrix (a full
          # mkosi build), so it gets its own narrower path gate rather than
          # riding the blanket `code` filter: skip only when the filter ran
          # and saw no guest-image-relevant change in the latest push.
          if [ "$FILTER_OUTCOME" = "success" ] && [ "$GUEST_IMAGE_CHANGED" = "false" ]; then
            guest_image=false
          else
            guest_image=true
          fi
          echo "guest_image=$guest_image" >> "$GITHUB_OUTPUT"
          echo "filter_outcome=$FILTER_OUTCOME guest_image_changed=${GUEST_IMAGE_CHANGED:-<none>} -> guest_image=$guest_image"

  preflight:
    name: preflight
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    runs-on: *linux_runner
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/omnifs-just

      - uses: dtolnay/rust-toolchain@1.95.0

      - name: Run preflight checks
        run: |
          set -euo pipefail
          just fmt-check
          just just-check

  components:
    name: components
    needs: preflight
    runs-on: *linux_runner
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-just

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: wasm32-wasip2

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: components
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-tools@1.246.2

      - name: Check, build, and validate WASM components
        run: |
          set -euo pipefail
          just check providers
          just build providers
          just validate providers

      - name: Stage WASM components
        run: |
          set -euo pipefail
          mkdir -p dist-wasm dist-provider-store
          cp target/wasm32-wasip2/release/*.wasm dist-wasm/
          test -n "$(find dist-wasm -maxdepth 1 -name 'omnifs_provider_*.wasm' -print -quit)"
          test -f dist-wasm/test_provider.wasm
          cp target/omnifs-provider-store/index.json dist-provider-store/
          cp target/omnifs-provider-store/*.wasm dist-provider-store/
          test -n "$(find dist-provider-store -maxdepth 1 -name '*.wasm' -print -quit)"

      - name: Attest WASM components
        if: env.CI_MAIN_PUSH == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist-wasm/*.wasm

      - name: Upload WASM components
        uses: actions/upload-artifact@v7
        with:
          name: omnifs-wasm
          path: dist-wasm/*.wasm
          retention-days: 90
          if-no-files-found: error

      - name: Upload provider store bundle
        uses: actions/upload-artifact@v7
        with:
          name: omnifs-provider-store
          path: dist-provider-store/*
          retention-days: 90
          if-no-files-found: error

  host-test:
    name: host test
    runs-on: *linux_runner
    needs: components
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/host-build
      # Providers are built by the `components` job and downloaded as the
      # omnifs-wasm artifact below, so the itest harness must not rebuild them
      # (this runner has no wasm32-wasip2 toolchain or WASI SDK).
      OMNIFS_ITEST_SKIP_PROVIDER_BUILD: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-just

      - uses: dtolnay/rust-toolchain@1.95.0

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: host-build
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: nextest@0.9.132

      - name: Prepare WASM sidecar directory
        run: rm -rf target/wasm32-wasip2/release

      - name: Download WASM sidecar inputs
        uses: actions/download-artifact@v8
        with:
          name: omnifs-wasm
          path: target/wasm32-wasip2/release

      - name: Lint and archive host tests
        run: |
          set -euo pipefail
          rm -rf dist/host-tests
          mkdir -p dist/host-tests
          just check host
          cargo nextest archive --profile ci --workspace \
            --exclude 'omnifs-provider-*' \
            --exclude test-provider \
            --exclude omnifs-embed-metadata \
            --archive-file dist/host-tests/host-tests.tar.zst

      - name: Isolate host test archive inputs
        run: |
          set -euo pipefail
          keep="${RUNNER_TEMP:-/tmp}/omnifs-engine-test-inputs"
          rm -rf "$keep"
          mkdir -p "$keep/dist/host-tests" "$keep/wasm" "$keep/target-preserve"
          cp dist/host-tests/host-tests.tar.zst "$keep/dist/host-tests/"
          cp target/wasm32-wasip2/release/*.wasm "$keep/wasm/"
          if [[ -d target/host-build ]]; then
            mv target/host-build "$keep/target-preserve/host-build"
          fi
          find target -mindepth 1 -maxdepth 1 ! -name wasm32-wasip2 -exec rm -rf {} +
          rm -rf dist/host-tests target/wasm32-wasip2/release
          mkdir -p dist/host-tests target/wasm32-wasip2/release
          cp "$keep/dist/host-tests/host-tests.tar.zst" dist/host-tests/
          cp "$keep/wasm/"*.wasm target/wasm32-wasip2/release/

      - name: Cache wasmtime component compilations
        # Wasmtime's on-disk cache is internally content-addressed (WASM hash +
        # wasmtime version), so stale entries are harmless and won't be served
        # to mismatched callers. GitHub caches are immutable, so use a unique
        # write key but restore through a stable OS/arch namespace shared by
        # push and pull_request runs.
        uses: actions/cache@v5
        with:
          path: ~/.cache/wasmtime
          key: wasmtime-cache-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            wasmtime-cache-${{ runner.os }}-${{ runner.arch }}-
            wasmtime-cache-${{ runner.os }}-

      - name: Run host tests
        run: |
          set -euo pipefail
          unset CARGO_TARGET_DIR
          test -f dist/host-tests/host-tests.tar.zst
          cargo nextest run --profile ci --archive-file dist/host-tests/host-tests.tar.zst

      - name: Restore host build cache inputs
        if: always()
        run: |
          set -euo pipefail
          keep="${RUNNER_TEMP:-/tmp}/omnifs-engine-test-inputs"
          if [[ -d "$keep/target-preserve/host-build" ]]; then
            rm -rf target/host-build
            mkdir -p target
            mv "$keep/target-preserve/host-build" target/host-build
          fi

  cli-linux-x64:
    name: cli linux x64
    needs: [preflight, components]
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (github.event.pull_request.user.login == 'raulk' ||
         contains(github.event.pull_request.labels.*.name, 'ci-full')))
    runs-on: *linux_runner
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/cli-linux-x64
    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-just

      - uses: ./.github/actions/omnifs-docker

      - uses: dtolnay/rust-toolchain@1.95.0

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cli-linux-x64
          cache-on-failure: true

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Download WASM components
        uses: actions/download-artifact@v8
        with:
          name: omnifs-wasm
          path: target/wasm32-wasip2/release

      - name: Build Linux x64 CLI
        id: build
        env:
          OMNIFS_RELEASE: "1"
        run: scripts/ci/build-linux-zigbuild.sh x86_64-unknown-linux-gnu.2.17

      - name: Package Linux x64 CLI
        run: >-
          scripts/ci/package-cli.sh linux-x64
          "${{ steps.build.outputs.artifact }}"
          "${{ steps.build.outputs.thin_artifact }}"

      - name: Attest Linux x64 CLI archive
        if: env.CI_MAIN_PUSH == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/cli/linux-x64/omnifs-cli-linux-x64.tar.xz

      - name: Upload Linux x64 CLI archive
        uses: actions/upload-artifact@v7
        with:
          name: omnifs-cli-linux-x64
          path: dist/cli/linux-x64/omnifs-cli-linux-x64.tar.xz*
          retention-days: 90
          if-no-files-found: error

  # Runs the frontend conformance matrix against a live kernel-FUSE mount served
  # by the packaged Linux CLI, and uploads the per-column scorecard. Gated like
  # cli-linux-x64 (whose binary it consumes); a skipped dependency skips this.
  conformance-fuse:
    name: conformance fuse
    needs: [changes, components, cli-linux-x64]
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (github.event.pull_request.user.login == 'raulk' ||
         contains(github.event.pull_request.labels.*.name, 'ci-full')))
    runs-on: *linux_runner
    env:
      # Providers come from the components job's omnifs-wasm artifact; the itest
      # harness must not rebuild them (no wasm toolchain on this runner).
      OMNIFS_ITEST_SKIP_PROVIDER_BUILD: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.95.0

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: conformance-fuse
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: nextest@0.9.132

      - name: Install fuse3 and NFS client
        run: |
          set -euo pipefail
          sudo apt-get update
          # fuse3 for the FUSE lane; nfs-common provides mount.nfs4 for the
          # Linux NFS loopback mount the dual-frontend lane exercises.
          sudo apt-get install -y --no-install-recommends fuse3 nfs-common

      - name: Prepare WASM sidecar directory
        run: rm -rf target/wasm32-wasip2/release

      - name: Download WASM sidecar inputs
        uses: actions/download-artifact@v8
        with:
          name: omnifs-wasm
          path: target/wasm32-wasip2/release

      - name: Download Linux x64 CLI archive
        uses: actions/download-artifact@v8
        with:
          name: omnifs-cli-linux-x64
          path: dist-cli

      - name: Extract Linux x64 CLI binary
        run: |
          set -euo pipefail
          mkdir -p dist-cli/bin
          tar -C dist-cli/bin -xJf dist-cli/omnifs-cli-linux-x64.tar.xz
          test -x dist-cli/bin/omnifs
          test -x dist-cli/bin/omnifs-thin

      - name: Run frontend conformance matrix and control-plane acceptance
        run: |
          set -euo pipefail
          OMNIFS_ACCEPTANCE_LIVE=1 \
          OMNIFS_BIN="$(pwd)/dist-cli/bin/omnifs" \
          OMNIFS_THIN_BIN="$(pwd)/dist-cli/bin/omnifs-thin" \
          cargo nextest run -p omnifs-itest \
            -E 'binary(frontend_matrix) + binary(control_plane) + binary(multi_frontend) + binary(wire_reattach)' --no-capture

      - name: Upload conformance scorecards
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-scorecards
          path: target/conformance/*.json
          retention-days: 90
          if-no-files-found: warn

  cli-linux-arm64:
    name: cli linux arm64
    needs: [preflight, components]
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (github.event.pull_request.user.login == 'raulk' ||
         contains(github.event.pull_request.labels.*.name, 'ci-full')))
    runs-on: &arm_runner ${{ vars.CI_RUNNER_FAMILY == 'blacksmith' && 'blacksmith-2vcpu-ubuntu-2404-arm' || 'ubuntu-24.04-arm' }}
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/cli-linux-arm64
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-just

      - uses: dtolnay/rust-toolchain@1.95.0

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cli-linux-arm64
          cache-on-failure: true

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Download WASM components
        uses: actions/download-artifact@v8
        with:
          name: omnifs-wasm
          path: target/wasm32-wasip2/release

      - name: Build Linux arm64 CLI
        id: build
        env:
          OMNIFS_RELEASE: "1"
        run: scripts/ci/build-linux-zigbuild.sh aarch64-unknown-linux-gnu.2.17

      - name: Package Linux arm64 CLI
        run: >-
          scripts/ci/package-cli.sh linux-arm64
          "${{ steps.build.outputs.artifact }}"
          "${{ steps.build.outputs.thin_artifact }}"

      - name: Attest Linux arm64 CLI archive
        if: env.CI_MAIN_PUSH == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/cli/linux-arm64/omnifs-cli-linux-arm64.tar.xz

      - name: Upload Linux arm64 CLI archive
        uses: actions/upload-artifact@v7
        with:
          name: omnifs-cli-linux-arm64
          path: dist/cli/linux-arm64/omnifs-cli-linux-arm64.tar.xz*
          retention-days: 90
          if-no-files-found: error

  cli-darwin:
    name: cli darwin
    needs: [preflight, components]
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (github.event.pull_request.user.login == 'raulk' ||
         contains(github.event.pull_request.labels.*.name, 'ci-full')))
    runs-on: *linux_runner
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/cli-darwin
    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-just

      - uses: ./.github/actions/omnifs-docker

      - uses: dtolnay/rust-toolchain@1.95.0

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cli-darwin
          cache-on-failure: true
          cache-directories: .cache/darwin-rustup

      - name: Download WASM components
        uses: actions/download-artifact@v8
        with:
          name: omnifs-wasm
          path: target/wasm32-wasip2/release

      - name: Build Darwin CLI binaries
        id: build
        env:
          DARWIN_RUSTUP_HOME: ${{ github.workspace }}/.cache/darwin-rustup
          OMNIFS_RELEASE: "1"
        run: scripts/ci/build-darwin-zigbuild.sh

      - name: Package Darwin CLI archives
        run: |
          set -euo pipefail
          scripts/ci/package-cli.sh darwin-x64 \
            "${{ steps.build.outputs.x64_artifact }}" \
            "${{ steps.build.outputs.x64_thin_artifact }}"
          scripts/ci/package-cli.sh darwin-arm64 \
            "${{ steps.build.outputs.arm64_artifact }}" \
            "${{ steps.build.outputs.arm64_thin_artifact }}"

      - name: Attest Darwin CLI archives
        if: env.CI_MAIN_PUSH == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/cli/*/omnifs-cli-*.tar.xz

      - name: Upload Darwin x64 CLI archive
        uses: actions/upload-artifact@v7
        with:
          name: omnifs-cli-darwin-x64
          path: dist/cli/darwin-x64/omnifs-cli-darwin-x64.tar.xz*
          retention-days: 90
          if-no-files-found: error

      - name: Upload Darwin arm64 CLI archive
        uses: actions/upload-artifact@v7
        with:
          name: omnifs-cli-darwin-arm64
          path: dist/cli/darwin-arm64/omnifs-cli-darwin-arm64.tar.xz*
          retention-days: 90
          if-no-files-found: error

  # Builds the standalone `omnifs-thin` binary the frontend images run: it
  # needs no provider WASM (no `components` dependency, unlike `cli-linux-*`)
  # since it contains no engine runtime and no Wasmtime.
  thin-linux-x64:
    name: thin linux x64
    needs: preflight
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (github.event.pull_request.user.login == 'raulk' ||
         contains(github.event.pull_request.labels.*.name, 'ci-full')))
    runs-on: *linux_runner
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/thin-linux-x64
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-just

      - uses: dtolnay/rust-toolchain@1.95.0

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: thin-linux-x64
          cache-on-failure: true

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build Linux x64 omnifs-thin
        id: build
        env:
          OMNIFS_PACKAGE: omnifs-thin
          OMNIFS_BIN: omnifs-thin
        run: scripts/ci/build-linux-zigbuild.sh x86_64-unknown-linux-gnu.2.17

      - name: Upload Linux x64 omnifs-thin binary
        uses: actions/upload-artifact@v7
        with:
          name: omnifs-thin-linux-x64
          path: ${{ steps.build.outputs.artifact }}
          retention-days: 90
          if-no-files-found: error

  thin-linux-arm64:
    name: thin linux arm64
    needs: preflight
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (github.event.pull_request.user.login == 'raulk' ||
         contains(github.event.pull_request.labels.*.name, 'ci-full')))
    runs-on: *arm_runner
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/thin-linux-arm64
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-just

      - uses: dtolnay/rust-toolchain@1.95.0

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: thin-linux-arm64
          cache-on-failure: true

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build Linux arm64 omnifs-thin
        id: build
        env:
          OMNIFS_PACKAGE: omnifs-thin
          OMNIFS_BIN: omnifs-thin
        run: scripts/ci/build-linux-zigbuild.sh aarch64-unknown-linux-gnu.2.17

      - name: Upload Linux arm64 omnifs-thin binary
        uses: actions/upload-artifact@v7
        with:
          name: omnifs-thin-linux-arm64
          path: ${{ steps.build.outputs.artifact }}
          retention-days: 90
          if-no-files-found: error

  # Builds the libkrun guest disk image (scripts/guest-image/), asserts its
  # static shape, and publishes it as a ghcr OCI artifact sha-keyed on this
  # commit; `release`'s `promote` job retags it to the version on ship. The
  # libkrun BOOT smoke and conformance lanes stay local-only (GH runners
  # cannot nest virtualization; see docs/contracts/60-build-validation.md),
  # so this job only proves the image's static shape, never a live boot.
  guest-image-arm64:
    name: guest image arm64
    needs: [changes, thin-linux-arm64]
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && needs.changes.outputs.guest_image == 'true')
    runs-on: *arm_runner
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-docker

      - name: Download Linux arm64 omnifs-thin binary
        uses: actions/download-artifact@v8
        with:
          name: omnifs-thin-linux-arm64
          path: dist-thin

      - name: Mark omnifs-thin binary executable
        run: chmod 0755 dist-thin/omnifs-thin

      # Hosted arm64 runners can run privileged containers with loop
      # devices, but the loop module is not always pre-loaded; make sure
      # /dev/loop-control exists before mkosi (inside its container) and
      # check-guest-image.sh (also containerized) both need it.
      - name: Ensure loop device support
        run: |
          set -euo pipefail
          sudo modprobe loop || true
          test -e /dev/loop-control

      - name: Build the release-profile guest image
        env:
          OMNIFS_THIN_BIN: ${{ github.workspace }}/dist-thin/omnifs-thin
          OUT_DIR: ${{ github.workspace }}/target/guest-image
        run: scripts/guest-image/build.sh --profile release

      - name: Assert the release-profile static guarantees
        run: scripts/ci/check-guest-image.sh target/guest-image/omnifs-guest.raw release

      - name: Compress the guest image
        run: zstd -19 -T0 -f target/guest-image/omnifs-guest.raw -o target/guest-image/omnifs-guest.raw.zst

      - uses: oras-project/setup-oras@v2
        with:
          version: 1.3.1

      # A PR from a fork gets a read-only GITHUB_TOKEN regardless of the
      # `packages: write` requested above (a hard GitHub security boundary),
      # so it cannot push; build and assert still ran above, and this step
      # says so loudly instead of failing on a 403.
      - name: Push the guest image to ghcr
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.fork == false
        env:
          TAG: sha-${{ github.sha }}
        run: |
          set -euo pipefail
          oras push "${REGISTRY}/${GUEST_IMAGE_NAME}:${TAG}" \
            --artifact-type application/vnd.omnifs.guest-image.v1+zstd \
            target/guest-image/omnifs-guest.raw.zst:application/vnd.omnifs.guest-image.v1+zstd

      - name: Skip ghcr push (fork PR has no registry write access)
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.fork == true
        run: |
          echo "::warning::skipping ghcr push for the guest image: this PR is from a fork and has no registry write access"

  # Builds the omnifs-frontend image (the Docker-hosted FUSE frontend, `omnifs
  # frontend up`): the Dockerfile's `frontend-release` target. See
  # docs/contracts/60-build-validation.md.
  frontend-amd64:
    name: frontend amd64
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (github.event.pull_request.user.login == 'raulk' ||
         contains(github.event.pull_request.labels.*.name, 'ci-full')))
    runs-on: *linux_runner
    needs: thin-linux-x64
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-docker

      - name: Download Linux x64 omnifs-thin binary
        uses: actions/download-artifact@v8
        with:
          name: omnifs-thin-linux-x64
          path: dist-thin

      - name: Mark omnifs-thin binary executable
        run: chmod 0755 dist-thin/omnifs-thin

      - name: Build and push amd64 frontend image
        id: docker
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:docker-amd64-${{ github.sha }}
          PLATFORM: linux/amd64
          PUSH: "true"
          OMNIFS_BINARY: ${{ github.workspace }}/dist-thin/omnifs-thin
        run: scripts/ci/build-frontend-image.sh

      - name: Export amd64 image digest
        run: |
          set -euo pipefail
          digest="${{ steps.docker.outputs.digest }}"
          test -n "$digest"
          mkdir -p /tmp/digests
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload amd64 image digest
        uses: actions/upload-artifact@v7
        with:
          name: frontend-digest-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  frontend-arm64:
    name: frontend arm64
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (github.event.pull_request.user.login == 'raulk' ||
         contains(github.event.pull_request.labels.*.name, 'ci-full')))
    runs-on: *arm_runner
    needs: thin-linux-arm64
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-docker

      - name: Download Linux arm64 omnifs-thin binary
        uses: actions/download-artifact@v8
        with:
          name: omnifs-thin-linux-arm64
          path: dist-thin

      - name: Mark omnifs-thin binary executable
        run: chmod 0755 dist-thin/omnifs-thin

      - name: Build and push arm64 frontend image
        id: docker
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:docker-arm64-${{ github.sha }}
          PLATFORM: linux/arm64
          PUSH: "true"
          OMNIFS_BINARY: ${{ github.workspace }}/dist-thin/omnifs-thin
        run: scripts/ci/build-frontend-image.sh

      - name: Export arm64 image digest
        run: |
          set -euo pipefail
          digest="${{ steps.docker.outputs.digest }}"
          test -n "$digest"
          mkdir -p /tmp/digests
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload arm64 image digest
        uses: actions/upload-artifact@v7
        with:
          name: frontend-digest-arm64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Smokes the contributor dev flow's CI-relevant halves: a host-native daemon
  # on this runner (kernel FUSE) plus the omnifs-frontend image `frontend-amd64`
  # built, attached over TCP. Needs the CLI on PATH (host-native, not
  # containerized) and fuse3 on the runner itself.
  smoke-amd64:
    name: smoke amd64
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (github.event.pull_request.user.login == 'raulk' ||
         contains(github.event.pull_request.labels.*.name, 'ci-full')))
    runs-on: *linux_runner
    needs: [frontend-amd64, cli-linux-x64]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      FRONTEND_IMAGE: ghcr.io/${{ github.repository }}-frontend:smoke
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-docker

      - uses: oven-sh/setup-bun@v2

      - name: Install fuse3
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fuse3

      - name: Download provider store bundle
        uses: actions/download-artifact@v8
        with:
          name: omnifs-provider-store
          path: target/omnifs-provider-store

      - uses: ./.github/actions/omnifs-install-cli
        with:
          arch: x64

      - uses: ./.github/actions/omnifs-load-frontend
        with:
          arch: amd64
          image: ${{ env.FRONTEND_IMAGE }}

      - name: Run native+frontend smoke test
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: scripts/ci/smoke-native-frontend.sh

  smoke-arm64:
    name: smoke arm64
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (github.event.pull_request.user.login == 'raulk' ||
         contains(github.event.pull_request.labels.*.name, 'ci-full')))
    runs-on: *arm_runner
    needs: [frontend-arm64, cli-linux-arm64]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      FRONTEND_IMAGE: ghcr.io/${{ github.repository }}-frontend:smoke
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-docker

      - uses: oven-sh/setup-bun@v2

      - name: Install fuse3
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fuse3

      - name: Download provider store bundle
        uses: actions/download-artifact@v8
        with:
          name: omnifs-provider-store
          path: target/omnifs-provider-store

      - uses: ./.github/actions/omnifs-install-cli
        with:
          arch: arm64

      - uses: ./.github/actions/omnifs-load-frontend
        with:
          arch: arm64
          image: ${{ env.FRONTEND_IMAGE }}

      - name: Run native+frontend smoke test
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: scripts/ci/smoke-native-frontend.sh

  # The frontend image needs no daemon, no dev home, and no provider store: it
  # only ever runs `omnifs-thin fuse`, so its smoke test is the three
  # structural checks in scripts/ci/smoke-frontend-image.sh, not the
  # scripts/dev.ts launch path smoke-amd64/arm64 use. The fuse-docker gate
  # separately exercises the live daemon, TCP attach, and FUSE mount path.
  smoke-frontend-amd64:
    name: smoke frontend amd64
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (github.event.pull_request.user.login == 'raulk' ||
         contains(github.event.pull_request.labels.*.name, 'ci-full')))
    runs-on: *linux_runner
    needs: frontend-amd64
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    env:
      IMAGE: ghcr.io/${{ github.repository }}-frontend:smoke
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-docker

      - uses: ./.github/actions/omnifs-load-frontend
        with:
          arch: amd64
          image: ${{ env.IMAGE }}

      - name: Run frontend image smoke test
        run: scripts/ci/smoke-frontend-image.sh

  smoke-frontend-arm64:
    name: smoke frontend arm64
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (github.event.pull_request.user.login == 'raulk' ||
         contains(github.event.pull_request.labels.*.name, 'ci-full')))
    runs-on: *arm_runner
    needs: frontend-arm64
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    env:
      IMAGE: ghcr.io/${{ github.repository }}-frontend:smoke
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-docker

      - uses: ./.github/actions/omnifs-load-frontend
        with:
          arch: arm64
          image: ${{ env.IMAGE }}

      - name: Run frontend image smoke test
        run: scripts/ci/smoke-frontend-image.sh

  # Exercises the Docker-hosted FUSE frontend end to end against a real
  # host-native daemon and the real amd64 frontend image. Mirrors
  # conformance-fuse's input-consumption shape (wasm sidecar, packaged Linux
  # CLI) and additionally needs frontend-amd64's image digest. One job, no
  # per-arch matrix: the frontend image build already covers arm64 separately
  # in smoke-frontend-arm64, which does not need a live daemon.
  fuse-docker:
    name: fuse docker
    needs: [changes, components, cli-linux-x64, frontend-amd64]
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        (github.event.pull_request.user.login == 'raulk' ||
         contains(github.event.pull_request.labels.*.name, 'ci-full')))
    runs-on: *linux_runner
    env:
      OMNIFS_ITEST_SKIP_PROVIDER_BUILD: "1"
      OMNIFS_FRONTEND_IMAGE: "omnifs-frontend:ci"
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.95.0

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: fuse-docker
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: nextest@0.9.132

      - uses: ./.github/actions/omnifs-docker

      - name: Install fuse3
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fuse3

      - name: Prepare WASM sidecar directory
        run: rm -rf target/wasm32-wasip2/release

      - name: Download WASM sidecar inputs
        uses: actions/download-artifact@v8
        with:
          name: omnifs-wasm
          path: target/wasm32-wasip2/release

      - name: Download Linux x64 CLI archive
        uses: actions/download-artifact@v8
        with:
          name: omnifs-cli-linux-x64
          path: dist-cli

      - name: Extract Linux x64 CLI binary
        run: |
          set -euo pipefail
          mkdir -p dist-cli/bin
          tar -C dist-cli/bin -xJf dist-cli/omnifs-cli-linux-x64.tar.xz
          test -x dist-cli/bin/omnifs
          test -x dist-cli/bin/omnifs-thin

      - uses: ./.github/actions/omnifs-load-frontend
        with:
          arch: amd64
          image: ${{ env.OMNIFS_FRONTEND_IMAGE }}

      - name: Run the fuse-docker acceptance gate
        run: |
          set -euo pipefail
          OMNIFS_ACCEPTANCE_LIVE=1 \
          OMNIFS_BIN="$(pwd)/dist-cli/bin/omnifs" \
          OMNIFS_THIN_BIN="$(pwd)/dist-cli/bin/omnifs-thin" \
          cargo nextest run -p omnifs-itest -E 'binary(frontend_docker)' --no-capture

      - name: Upload fuse-docker scorecards
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-scorecards-fuse-docker
          path: target/conformance/*.json
          retention-days: 90
          if-no-files-found: warn

  publish:
    name: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: *linux_runner
    needs:
      - preflight
      - components
      - host-test
      - cli-linux-x64
      - cli-linux-arm64
      - cli-darwin
      - frontend-amd64
      - frontend-arm64
      - smoke-amd64
      - smoke-arm64
      - smoke-frontend-amd64
      - smoke-frontend-arm64
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-docker

      - name: Download frontend image digests
        uses: actions/download-artifact@v8
        with:
          pattern: frontend-digest-*
          path: /tmp/frontend-digests
          merge-multiple: true

      - name: Publish frontend multi-platform manifest
        run: |
          set -euo pipefail
          scripts/ci/publish-manifest.sh \
            "${REGISTRY}/${FRONTEND_IMAGE_NAME}" "sha-${GITHUB_SHA}" /tmp/frontend-digests frontend

      - name: Upload frontend manifest digest
        uses: actions/upload-artifact@v7
        with:
          name: frontend-manifest-digest
          path: |
            frontend-manifest.txt
            frontend-manifest-digest.txt
          retention-days: 90
          if-no-files-found: error
