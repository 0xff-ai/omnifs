name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Single registry-backed buildx cache shared across every job that
  # touches the Dockerfile. mode=max keeps intermediate layers (deps,
  # providers, builder) so each job only rebuilds what actually changed.
  BUILD_CACHE_REF: ghcr.io/${{ github.repository }}:buildcache

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run cargo fmt + clippy inside the builder image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          target: lint
          push: false
          load: false
          cache-from: type=registry,ref=${{ env.BUILD_CACHE_REF }}
          cache-to: type=registry,ref=${{ env.BUILD_CACHE_REF }},mode=max

  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run cargo test inside the builder image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          target: test
          push: false
          load: false
          cache-from: type=registry,ref=${{ env.BUILD_CACHE_REF }}
          cache-to: type=registry,ref=${{ env.BUILD_CACHE_REF }},mode=max

  smoke:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && (
        contains(fromJSON('["raulk"]'), github.event.pull_request.user.login) ||
        contains(github.event.pull_request.labels.*.name, 'ci-full')
      ))
    runs-on: ubuntu-latest
    needs: [lint, build-test]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    # compose.yaml interpolates these on every `docker compose ...`
    # invocation (up, exec, down). Setting them at the job level
    # avoids per-step exports and keeps cleanup working even when an
    # earlier step short-circuited.
    env:
      GITHUB_TOKEN_FILE: ${{ github.workspace }}/.secrets/github_token
      OMNIFS_DB_FIXTURE: ${{ github.workspace }}/.secrets/chinook.sqlite
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build runtime image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          target: runtime
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.BUILD_CACHE_REF }}
          cache-to: type=registry,ref=${{ env.BUILD_CACHE_REF }},mode=max

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2.1.0

      - name: Start SSH agent socket
        run: |
          set -euo pipefail
          eval "$(ssh-agent -a "$RUNNER_TEMP/ssh-agent.sock")"
          echo "SSH_AUTH_SOCK=$RUNNER_TEMP/ssh-agent.sock" >> "$GITHUB_ENV"

      - name: Create fixtures
        run: |
          set -euo pipefail
          mkdir -p .secrets
          # GitHub token for the github provider.
          printf '%s' "${{ github.token }}" > .secrets/github_token
          # Chinook SQLite fixture for the db provider. The image bakes
          # docker/providers/db.json with path /data/test.db; compose
          # mounts this file there. Pinned to the lerocha master copy;
          # the database has not changed in years.
          curl -fsSL -o .secrets/chinook.sqlite \
            https://raw.githubusercontent.com/lerocha/chinook-database/master/ChinookDatabase/DataSources/Chinook_Sqlite.sqlite

      - name: Start stack
        run: |
          set -euo pipefail
          docker compose up -d

          for _ in $(seq 1 60); do
            if docker compose exec -T omnifs sh -lc "grep -qs ' /omnifs ' /proc/mounts"; then
              exit 0
            fi

            if ! docker ps --format '{{.Names}}' | grep -qx omnifs; then
              docker compose logs omnifs >&2 || true
              docker compose exec -T omnifs sh -lc 'cat /tmp/omnifs.log' >&2 || true
              exit 1
            fi

            sleep 1
          done

          docker compose logs omnifs >&2 || true
          docker compose exec -T omnifs sh -lc 'cat /tmp/omnifs.log' >&2 || true
          exit 1

      - name: Run demo smoke script
        run: |
          set -euo pipefail
          docker compose exec -T omnifs env \
            OMNIFS_DEMO_MODE=smoke \
            OMNIFS_DEMO_OWNER=ollama \
            OMNIFS_DEMO_REPO=ollama \
            /tmp/demo.sh

      - name: Dump omnifs log on failure
        if: failure()
        run: |
          docker compose logs omnifs || true
          docker compose exec -T omnifs sh -lc 'cat /tmp/omnifs.log' || true

      - name: Clean up compose stack
        if: always()
        run: docker compose down --remove-orphans --volumes

  docker-build:
    name: docker-build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: [lint, build-test, smoke]
    if: >-
      (github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/v')
      )) ||
      (github.event_name == 'pull_request' && (
        contains(fromJSON('["raulk"]'), github.event.pull_request.user.login) ||
        contains(github.event.pull_request.labels.*.name, 'ci-full')
      ))
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            artifact-name: docker-digest-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            artifact-name: docker-digest-arm64
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker labels
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          target: runtime
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          # The registry cache is shared with lint, build-test, and smoke,
          # so the matrix legs reuse cooked deps and provider builds.
          cache-from: type=registry,ref=${{ env.BUILD_CACHE_REF }}
          cache-to: type=registry,ref=${{ env.BUILD_CACHE_REF }},mode=max
          # In-manifest SLSA provenance + SPDX SBOM, attached to the
          # image manifest by buildkit and verifiable with cosign.
          provenance: mode=max
          sbom: true

      - name: Export image digest
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload image digest
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact-name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-publish:
    runs-on: ubuntu-latest
    needs: docker-build
    if: >-
      (github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/tags/v')
      )) ||
      (github.event_name == 'pull_request' && (
        contains(fromJSON('["raulk"]'), github.event.pull_request.user.login) ||
        contains(github.event.pull_request.labels.*.name, 'ci-full')
      ))
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Download image digests
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: docker-digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create and push manifest list
        working-directory: /tmp/digests
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=("-t" "$tag")
          done

          shopt -s nullglob
          digest_files=(*)
          if (( ${#digest_files[@]} != 2 )); then
            printf 'expected 2 platform digests, found %d\n' "${#digest_files[@]}" >&2
            exit 1
          fi

          refs=()
          for digest_file in "${digest_files[@]}"; do
            refs+=("$IMAGE@sha256:$digest_file")
          done

          docker buildx imagetools create "${tag_args[@]}" "${refs[@]}"

      - name: Verify pushed image platforms
        id: manifest
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
        run: |
          set -euo pipefail
          tag="$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")"
          docker buildx imagetools inspect "$tag" | tee image-manifest.txt
          grep -q 'Platform:.*linux/amd64' image-manifest.txt
          grep -q 'Platform:.*linux/arm64' image-manifest.txt
          digest="$(awk '/^Digest:/ { print $2; exit }' image-manifest.txt)"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Attest image build provenance
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true
          # `raulk/omnifs` is a user-owned repo. GitHub's attestation
          # storage records are only supported for org-owned repos, so
          # the default create-storage-record=true would fail at attest
          # time. The Sigstore bundle is still attached to the OCI
          # manifest (via push-to-registry) and is verifiable with
          # `gh attestation verify`.
          create-storage-record: false
