name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CI_MAIN_PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

jobs:
  preflight-fast:
    name: preflight fast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-just

      - uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: just ci-preflight-fast

  preflight-policy:
    name: preflight policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/omnifs-just

      - name: Validate npm manifests
        run: just npm-validate

      - name: Check release metadata
        if: github.event_name == 'pull_request'
        env:
          HEAD_REF: ${{ github.head_ref }}
          NO_CHANGELOG: ${{ contains(github.event.pull_request.labels.*.name, 'no-changelog') }}
        run: |
          set -euo pipefail
          if [[ "$HEAD_REF" == release/* ]]; then
            just release-check
          elif [[ "$NO_CHANGELOG" != "true" ]]; then
            just release-check origin/main HEAD
          fi

  wasm:
    name: wasm
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-just

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-tools@1.246.2

      - name: Check, build, and validate provider WASM
        run: just ci-wasm

      - name: Stage WASM artifacts
        run: |
          set -euo pipefail
          mkdir -p dist-wasm
          cp target/wasm32-wasip2/release/*.wasm dist-wasm/
          test -n "$(find dist-wasm -maxdepth 1 -name 'omnifs_provider_*.wasm' -print -quit)"
          test -n "$(find dist-wasm -maxdepth 1 -name 'omnifs_tool_*.wasm' -print -quit)"
          test -f dist-wasm/test_provider.wasm

      - name: Attest WASM components
        if: env.CI_MAIN_PUSH == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist-wasm/*.wasm

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: omnifs-wasm
          path: dist-wasm/*.wasm
          retention-days: 90
          if-no-files-found: error

  host-test:
    name: host test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: wasm
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-just

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: host-test
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: nextest@0.9.132

      - name: Download WASM sidecar inputs
        uses: actions/download-artifact@v8
        with:
          name: omnifs-wasm
          path: target/wasm32-wasip2/release

      - name: Cache wasmtime component compilations
        # Wasmtime's on-disk cache is internally content-addressed (WASM hash +
        # wasmtime version), so stale entries are harmless and won't be served
        # to mismatched callers. Key on $sha so each commit appends a fresh
        # snapshot to the GHA cache; restore-keys recover the previous
        # snapshot. Avoids tying invalidation to Cargo.lock / rust-toolchain,
        # which would force a cold cache on every unrelated dep bump.
        uses: actions/cache@v5
        with:
          path: ~/.cache/wasmtime
          key: wasmtime-cache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            wasmtime-cache-${{ runner.os }}-

      - name: Lint and test host workspace
        run: just ci-host

  verify:
    name: verify
    runs-on: ubuntu-latest
    needs: [preflight-fast, preflight-policy, wasm, host-test]
    if: always()
    steps:
      - name: Verify required checks
        env:
          PREFLIGHT_FAST_RESULT: ${{ needs.preflight-fast.result }}
          PREFLIGHT_POLICY_RESULT: ${{ needs.preflight-policy.result }}
          WASM_RESULT: ${{ needs.wasm.result }}
          HOST_TEST_RESULT: ${{ needs.host-test.result }}
        run: |
          set -euo pipefail
          test "$PREFLIGHT_FAST_RESULT" = success
          test "$PREFLIGHT_POLICY_RESULT" = success
          test "$WASM_RESULT" = success
          test "$HOST_TEST_RESULT" = success

  cli-cross:
    name: cli (linux-x64, darwin)
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
        (github.event.pull_request.user.login == 'raulk' ||
         contains(github.event.pull_request.labels.*.name, 'ci-full')))
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [verify, wasm]
    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-just

      - uses: ./.github/actions/omnifs-docker

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cli-cross
          workspaces: |
            . -> target/ci-cross
          cache-on-failure: true

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Download WASM sidecar inputs
        uses: actions/download-artifact@v8
        with:
          name: omnifs-wasm
          path: target/wasm32-wasip2/release

      - name: Build Linux x64 CLI
        id: linux_x64
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target/ci-cross
        run: just ci-build-linux x86_64-unknown-linux-gnu.2.17

      - name: Cache darwin rustup toolchain
        uses: actions/cache@v5
        with:
          path: .cache/darwin-rustup
          key: darwin-rustup-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}
          restore-keys: |
            darwin-rustup-${{ runner.os }}-

      - name: Build Darwin CLI binaries
        id: darwin
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target/ci-cross
          DARWIN_RUSTUP_HOME: ${{ github.workspace }}/.cache/darwin-rustup
        run: just ci-build-darwin

      - name: Package cross-built CLI archives
        run: |
          set -euo pipefail
          just ci-package-cli linux-x64 "${{ steps.linux_x64.outputs.artifact }}"
          just ci-package-cli darwin-x64 "${{ steps.darwin.outputs.x64_artifact }}"
          just ci-package-cli darwin-arm64 "${{ steps.darwin.outputs.arm64_artifact }}"

      - name: Attest cross-built CLI archives
        if: env.CI_MAIN_PUSH == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/cli/*/omnifs-cli-*.tar.xz

      - name: Upload Linux x64 CLI archive
        uses: actions/upload-artifact@v7
        with:
          name: omnifs-cli-linux-x64
          path: dist/cli/linux-x64/omnifs-cli-linux-x64.tar.xz*
          retention-days: 90
          if-no-files-found: error

      - name: Upload Darwin x64 CLI archive
        uses: actions/upload-artifact@v7
        with:
          name: omnifs-cli-darwin-x64
          path: dist/cli/darwin-x64/omnifs-cli-darwin-x64.tar.xz*
          retention-days: 90
          if-no-files-found: error

      - name: Upload Darwin arm64 CLI archive
        uses: actions/upload-artifact@v7
        with:
          name: omnifs-cli-darwin-arm64
          path: dist/cli/darwin-arm64/omnifs-cli-darwin-arm64.tar.xz*
          retention-days: 90
          if-no-files-found: error

  cli-linux-arm64:
    name: cli (linux-arm64)
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
        (github.event.pull_request.user.login == 'raulk' ||
         contains(github.event.pull_request.labels.*.name, 'ci-full')))
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    needs: [verify, wasm]
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-just

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cli-linux-arm64
          cache-on-failure: true

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Download WASM sidecar inputs
        uses: actions/download-artifact@v8
        with:
          name: omnifs-wasm
          path: target/wasm32-wasip2/release

      - name: Build Linux arm64 CLI
        id: build
        run: just ci-build-linux aarch64-unknown-linux-gnu.2.17

      - name: Package Linux arm64 CLI
        run: just ci-package-cli linux-arm64 "${{ steps.build.outputs.artifact }}"

      - name: Attest Linux arm64 CLI archive
        if: env.CI_MAIN_PUSH == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/cli/linux-arm64/omnifs-cli-linux-arm64.tar.xz

      - name: Upload Linux arm64 CLI archive
        uses: actions/upload-artifact@v7
        with:
          name: omnifs-cli-linux-arm64
          path: dist/cli/linux-arm64/omnifs-cli-linux-arm64.tar.xz*
          retention-days: 90
          if-no-files-found: error

  runtime-image:
    name: runtime (${{ matrix.platform }})
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
        (github.event.pull_request.user.login == 'raulk' ||
         contains(github.event.pull_request.labels.*.name, 'ci-full')))
    runs-on: ${{ matrix.runner }}
    needs: [verify, wasm, cli-cross, cli-linux-arm64]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            id: linux-x64
            digest_name: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            id: linux-arm64
            digest_name: arm64
            runner: blacksmith-4vcpu-ubuntu-2404-arm
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-just

      - uses: ./.github/actions/omnifs-docker

      - name: Download WASM artifacts
        uses: actions/download-artifact@v8
        with:
          name: omnifs-wasm
          path: dist-wasm

      - name: Download Linux CLI archive
        uses: actions/download-artifact@v8
        with:
          name: omnifs-cli-${{ matrix.id }}
          path: dist-cli

      - name: Extract Linux CLI binary
        run: |
          set -euo pipefail
          mkdir -p dist-cli/bin
          tar -C dist-cli/bin -xJf dist-cli/omnifs-cli-${{ matrix.id }}.tar.xz
          test -x dist-cli/bin/omnifs

      - name: Build and push runtime image
        id: runtime
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:runtime-${{ matrix.digest_name }}-${{ github.sha }}
          PLATFORM: ${{ matrix.platform }}
          PUSH: "true"
          OMNIFS_BINARY: ${{ github.workspace }}/dist-cli/bin/omnifs
          OMNIFS_WASM_DIR: ${{ github.workspace }}/dist-wasm
        run: just ci-build-runtime

      - name: Export image digest
        run: |
          set -euo pipefail
          digest="${{ steps.runtime.outputs.digest }}"
          test -n "$digest"
          mkdir -p /tmp/digests
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload image digest
        uses: actions/upload-artifact@v7
        with:
          name: docker-digest-${{ matrix.digest_name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  smoke:
    name: smoke
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
        (github.event.pull_request.user.login == 'raulk' ||
         contains(github.event.pull_request.labels.*.name, 'ci-full')))
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: runtime-image
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      CONTAINER: omnifs
      IMAGE: ghcr.io/${{ github.repository }}:smoke
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-just

      - uses: ./.github/actions/omnifs-docker

      - name: Download amd64 image digest
        uses: actions/download-artifact@v8
        with:
          name: docker-digest-amd64
          path: /tmp/digests

      - name: Pull the amd64 image and tag it for smoke
        run: |
          set -euo pipefail
          digest_path=$(find /tmp/digests -mindepth 1 -maxdepth 1 -type f | head -n 1)
          test -n "$digest_path"
          digest_file="${digest_path##*/}"
          ref="${REGISTRY}/${IMAGE_NAME}@sha256:${digest_file}"
          docker pull "$ref"
          docker tag "$ref" "$IMAGE"

      - name: Run container smoke test
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: just ci-smoke-container

  docker-publish:
    name: docker publish
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
        (github.event.pull_request.user.login == 'raulk' ||
         contains(github.event.pull_request.labels.*.name, 'ci-full')))
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: runtime-image
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/omnifs-docker

      - name: Download image digests
        uses: actions/download-artifact@v8
        with:
          pattern: docker-digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Publish multi-platform manifest
        run: |
          set -euo pipefail
          refs=()
          for digest_file in /tmp/digests/*; do
            digest="${digest_file##*/}"
            refs+=("${REGISTRY}/${IMAGE_NAME}@sha256:${digest}")
          done
          test "${#refs[@]}" -eq 2
          tag="${REGISTRY}/${IMAGE_NAME}:sha-${GITHUB_SHA}"
          docker buildx imagetools create -t "$tag" "${refs[@]}"
          docker buildx imagetools inspect "$tag" > manifest.txt
          grep -q 'Platform:.*linux/amd64' manifest.txt
          grep -q 'Platform:.*linux/arm64' manifest.txt
          awk '/^Digest:/ { print $2; exit }' manifest.txt > manifest-digest.txt

      - name: Upload manifest digest
        uses: actions/upload-artifact@v7
        with:
          name: docker-manifest-digest
          path: |
            manifest.txt
            manifest-digest.txt
          retention-days: 90
          if-no-files-found: error

  full-factory:
    name: full factory
    if: >-
      always() &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/main') ||
       (github.event_name == 'pull_request' &&
        (github.event.pull_request.user.login == 'raulk' ||
         contains(github.event.pull_request.labels.*.name, 'ci-full'))))
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [cli-cross, cli-linux-arm64, runtime-image, smoke, docker-publish]
    steps:
      - name: Verify full factory jobs
        env:
          CLI_CROSS_RESULT: ${{ needs.cli-cross.result }}
          CLI_LINUX_ARM64_RESULT: ${{ needs.cli-linux-arm64.result }}
          RUNTIME_IMAGE_RESULT: ${{ needs.runtime-image.result }}
          SMOKE_RESULT: ${{ needs.smoke.result }}
          DOCKER_PUBLISH_RESULT: ${{ needs.docker-publish.result }}
        run: |
          set -euo pipefail
          test "$CLI_CROSS_RESULT" = success
          test "$CLI_LINUX_ARM64_RESULT" = success
          test "$RUNTIME_IMAGE_RESULT" = success
          test "$SMOKE_RESULT" = success
          test "$DOCKER_PUBLISH_RESULT" = success
