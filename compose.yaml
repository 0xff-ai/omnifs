name: omnifs

services:
  omnifs:
    build:
      context: .
    image: ghcr.io/raulk/omnifs:latest
    container_name: omnifs
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    environment:
      SSH_AUTH_SOCK: /ssh-agent
      GIT_SSH_COMMAND: ssh -F /dev/null -o StrictHostKeyChecking=accept-new
    secrets:
      - github_token
    volumes:
      - ${SSH_AUTH_SOCK:?set SSH_AUTH_SOCK on the host}:/ssh-agent
      - ./scripts/demo.sh:/tmp/demo.sh:ro
      # Bind-mount the host's docker socket so the omnifs container's
      # docker provider can talk to the host daemon over the
      # capability-checked `unix:` transport. The bind mount is the
      # *transport* surface, not a trust boundary: write access to
      # the daemon would still let the provider create/delete/exec on
      # the host's containers. The trust boundary is the provider's
      # source code (currently read-only) and the host's capability
      # checker, which only allows `unix:///var/run/docker.sock` for
      # this mount. Reconsider before enabling write paths.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # The db provider's baked config (docker/providers/db.json) points
      # at /data/test.db. Both `just dev` and the CI smoke job populate
      # OMNIFS_DB_FIXTURE before invoking compose; running compose
      # directly without setting it errors out with a clear message.
      - ${OMNIFS_DB_FIXTURE:?set OMNIFS_DB_FIXTURE to a SQLite fixture path (just dev and CI handle this automatically)}:/data/test.db:ro

secrets:
  github_token:
    file: ${GITHUB_TOKEN_FILE:-.secrets/github_token}
