[Distribution]
Distribution=debian
Release=trixie
Architecture=arm64

[Output]
Format=disk
ImageId=omnifs-guest
OutputDirectory=mkosi.output
CompressOutput=no

[Content]
Bootable=yes
Bootloader=systemd-boot
# fuse3 + iproute2 (attach-address diagnostics) + dropbear-bin (vsock ssh,
# socket-activated by omnifs-ssh.socket) are the only additions beyond a
# minimal systemd base. Debian's arm64 kernel builds FUSE_FS=y (not a
# module), so /dev/fuse needs no module autoload. dropbear-bin's postinst
# generates host keys at image-build time; there is no separate step here.
Packages=
    systemd
    systemd-boot-efi
    udev
    fuse3
    ca-certificates
    linux-image-arm64
    iproute2
    less
    dropbear-bin
Hostname=omnifs-guest
Locale=C.UTF-8
Timezone=UTC
# Root login is profile-gated (mkosi.profiles/{dev,release}/mkosi.conf): the
# dev profile keeps the unlocked autologin console for boot smoke and manual
# debugging; the release profile (the one shipped as a ghcr OCI artifact)
# sets neither RootPassword= nor Autologin=, so root stays locked (no
# password login) and no getty autologins. Base mkosi.conf itself stays
# neutral so the release profile needs no override to undo a dev default.
KernelCommandLine=console=hvc0 rw
WithNetwork=false
