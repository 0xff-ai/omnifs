[Distribution]
Distribution=debian
Release=trixie
Architecture=arm64

[Output]
Format=disk
ImageId=omnifs-guest
OutputDirectory=mkosi.output
CompressOutput=no

[Content]
Bootable=yes
Bootloader=systemd-boot
# Runtime and diagnostic tools beyond the bootable systemd base. The cloud
# kernel drops drivers for hardware krunkit never presents while retaining
# built-in FUSE support.
Packages=
    systemd
    systemd-boot-efi
    udev
    fuse3
    ca-certificates
    linux-image-cloud-arm64
    iproute2
    less
    dropbear-bin
Hostname=omnifs-guest
Locale=C.UTF-8
Timezone=UTC
# Debian's doc/man/info exclude list is separate from locale catalogs and
# device-tree blobs, so trim all three for this serial-console-only,
# single-locale appliance image.
WithDocs=no
RemoveFiles=
    /usr/share/locale/*
    /usr/lib/linux-image-*
# Root login is profile-gated (mkosi.profiles/{dev,release}/mkosi.conf): the
# dev profile keeps the unlocked autologin console for boot smoke and manual
# debugging; the release profile (the one shipped as a ghcr OCI artifact)
# sets neither RootPassword= nor Autologin=, so root stays locked (no
# password login) and no getty autologins. Base mkosi.conf itself stays
# neutral so the release profile needs no override to undo a dev default.
KernelCommandLine=console=hvc0 rw
WithNetwork=false
