[Distribution]
Distribution=debian
Release=trixie
Architecture=arm64

[Output]
Format=disk
ImageId=omnifs-guest
OutputDirectory=mkosi.output
CompressOutput=no

[Content]
Bootable=yes
Bootloader=systemd-boot
# fuse3 + iproute2 (attach-address diagnostics) are the only additions beyond
# a minimal systemd base; the frontend runner needs nothing else (no provider
# runtime, no shell toolbox, no sshd). Debian's arm64 kernel builds FUSE_FS=y
# (not a module), so /dev/fuse needs no module autoload.
Packages=
    systemd
    systemd-boot-efi
    udev
    fuse3
    ca-certificates
    linux-image-arm64
    iproute2
    less
Hostname=omnifs-guest
Locale=C.UTF-8
Timezone=UTC
# Dev-only convenience, not a production credential: this image is a local
# build artifact under target/ (gitignored) and is never published. An
# unlocked, autologin-enabled root shell on the serial console is how the
# boot smoke and manual debugging inspect a guest that gets stuck.
RootPassword=hashed:
Autologin=yes
KernelCommandLine=console=hvc0 rw
WithNetwork=false
