[Distribution]
Distribution=debian
Release=trixie
Architecture=arm64

[Output]
Format=disk
ImageId=omnifs-guest
OutputDirectory=mkosi.output
CompressOutput=no

[Content]
Bootable=yes
Bootloader=systemd-boot
# fuse3 + iproute2 (attach-address diagnostics) are the only additions beyond
# a minimal systemd base; the frontend runner needs nothing else (no provider
# runtime, no shell toolbox, no sshd). The cloud kernel flavor (vs. the
# generic linux-image-arm64) drops drivers for hardware krunkit never
# presents (other SoCs, wifi, etc.) and is much smaller; it still builds
# FUSE_FS=y (not a module) and boots under krunkit with /dev/fuse present,
# validated the same way as the generic flavor.
Packages=
    systemd
    systemd-boot-efi
    udev
    fuse3
    ca-certificates
    linux-image-cloud-arm64
    iproute2
    less
Hostname=omnifs-guest
Locale=C.UTF-8
Timezone=UTC
# Debian's own doc/man/info exclude list (dpkg path-exclude); translated
# message catalogs and per-board device-tree blobs are separate trees apt
# does not gate on WithDocs, so they are swept explicitly. Nothing here is
# loaded by a serial-console-only, single-locale (C.UTF-8) appliance image
# that boots via systemd-boot/UKI (no device-tree boot path, ever).
WithDocs=no
RemoveFiles=
    /usr/share/locale/*
    /usr/lib/linux-image-*
# Dev-only convenience, not a production credential: this image is a local
# build artifact under target/ (gitignored) and is never published. An
# unlocked, autologin-enabled root shell on the serial console is how the
# boot smoke and manual debugging inspect a guest that gets stuck.
RootPassword=hashed:
Autologin=yes
KernelCommandLine=console=hvc0 rw
WithNetwork=false
