# The release profile is the one CI builds, statically asserts
# (scripts/ci/check-guest-image.sh), and publishes as a ghcr OCI artifact. It
# sets neither RootPassword= nor Autologin=, the opposite of the dev
# profile's console convenience: root has no password login (mkosi never
# touches /etc/shadow when RootPassword= is unset, so Debian's own locked
# default stands) and no getty unit autologins. There is nothing to
# configure here beyond the absence of the dev profile's [Content] keys; the
# file exists so `--profile release` has a real profile to select and so the
# intent is documented next to its dev counterpart.
